<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Checklists — ALFA.CO</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1a56c4;--blue-light:#eff6ff;--green:#16a34a;--green-light:#f0fdf4;--red:#dc2626;--red-light:#fef2f2;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--bg:#f1f5f9;--font:'DM Sans',sans-serif;--hand:'Caveat',cursive;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.app-header{background:#1a2340;padding:0 14px;position:sticky;top:0;z-index:300;display:flex;align-items:center;justify-content:space-between;min-height:58px;box-shadow:0 2px 16px rgba(0,0,0,.35);gap:8px}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr-right{display:flex;gap:7px;align-items:center}
.save-ind{background:rgba(255,255,255,.1);color:#94a3b8;font-size:11px;font-weight:500;padding:4px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.12);transition:all .3s}
.save-ind.ok{color:#4ade80}
.btn{padding:7px 14px;border:none;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-blue{background:var(--blue);color:#fff}
.btn-green{background:#16a34a;color:#fff}
.btn-cancel{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.sec-tabs{background:#111d35;display:flex;padding:0 14px;border-top:1px solid rgba(255,255,255,.07)}
.sec-tab{padding:9px 16px;font-family:var(--font);font-size:12px;font-weight:700;color:#64748b;background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.sec-tab.active{color:#fff;border-bottom-color:#60a5fa}
.meta-bar{background:#fff;border-bottom:1px solid var(--border);padding:7px 14px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;font-size:12px}
.meta-bar label{color:var(--muted);font-weight:600;white-space:nowrap}
.meta-bar input,.meta-bar select{border:1px solid var(--border);border-radius:7px;padding:4px 8px;font-family:var(--font);font-size:12px;background:var(--bg);outline:none}
.cl-tabs{background:#fff;border-bottom:2px solid var(--border);padding:0 14px;display:flex;overflow-x:auto;scrollbar-width:none;gap:0}
.cl-tabs::-webkit-scrollbar{display:none}
.cl-tab{flex-shrink:0;padding:9px 14px;font-family:var(--font);font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;margin-bottom:-2px}
.cl-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.cl-hdr{padding:12px 14px 3px}
.cl-hdr h2{font-size:17px;font-weight:700;color:var(--blue)}
.cl-hdr .sub{font-size:11px;color:var(--muted);margin-top:2px}
.prog-wrap{margin:6px 14px 0;background:var(--border);border-radius:99px;height:4px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:99px;transition:width .4s}
.prog-lbl{font-size:10px;color:var(--muted);margin:2px 14px 0;text-align:right}
.day-tabs{display:flex;overflow-x:auto;gap:6px;padding:8px 14px 0;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:5px 10px;border-radius:99px;border:1.5px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap}
.day-tab.active{background:var(--blue);border-color:var(--blue);color:#fff}
.day-tab.done .dot{background:#4ade80}
.day-tab.partial .dot{background:#facc15}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-left:4px;vertical-align:middle;background:#cbd5e1}
.day-tab.active .dot{background:rgba(255,255,255,.5)}
.cards-wrap{padding:8px 14px 70px;display:flex;flex-direction:column;gap:8px}
.grp-div{background:linear-gradient(90deg,#1e3a5f,#1a56c4);border-radius:8px;padding:7px 12px;color:#fff;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.item-card{background:#fff;border-radius:11px;border:1.5px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.item-card.all-ok{border-color:#86efac;background:#f0fdf4}
.item-card.has-no{border-color:#fca5a5;background:#fef2f2}
.card-inner{padding:10px 12px 8px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.card-lbl{flex:1}
.badge{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:var(--bg);padding:1px 6px;border-radius:3px;margin-bottom:3px}
.badge.key{background:#fef9c3;color:#92400e}
.item-q{font-size:13px;font-weight:600;line-height:1.4;color:var(--text)}
.flag-btn{background:none;border:1.5px solid var(--border);border-radius:6px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;flex-shrink:0;transition:all .15s}
.flag-btn.on{background:#fef2f2;border-color:#f87171}
.shifts-row{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap}
.shift-blk{flex:1;min-width:130px;background:var(--bg);border-radius:8px;padding:6px 8px 5px}
.sh-title{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin-bottom:5px}
.ctrl-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.ctrl-lbl{font-size:10px;font-weight:700;color:var(--muted);min-width:62px;flex-shrink:0}
.yn-grp{display:flex;gap:4px}
.yn-btn{padding:5px 10px;border-radius:7px;border:1.5px solid var(--border);background:#fff;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--muted)}
.yn-btn.yes{background:var(--green-light);border-color:#86efac;color:var(--green)}
.yn-btn.no{background:var(--red-light);border-color:#fca5a5;color:var(--red)}
.cb-grp{display:flex;gap:6px}
.cb-item{display:flex;align-items:center;gap:3px;cursor:pointer;user-select:none}
.cb-box{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .15s}
.cb-box.ok{background:var(--green-light);border-color:#86efac;color:var(--green)}
.cb-box.no{background:var(--red-light);border-color:#fca5a5;color:var(--red)}
.cb-lbl{font-size:10px;color:var(--muted);font-weight:600}
.temp-inp{border:1.5px solid var(--border);border-radius:6px;padding:4px 5px;font-family:var(--hand);font-size:16px;font-weight:700;color:var(--blue);text-align:center;outline:none;background:#fff;width:56px}
.temp-inp.has-val{border-color:#93c5fd}
.cmt-btn{background:none;border:none;font-family:var(--font);font-size:11px;font-weight:600;color:var(--blue);cursor:pointer;padding:4px 0 1px}
.cmt-box{display:none;margin-top:4px}
.cmt-box.open{display:block}
.cmt-box textarea{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:6px 8px;font-family:var(--hand);font-size:15px;color:var(--blue);resize:none;outline:none;min-height:40px;background:var(--blue-light)}
.hygiene-wrap{background:#fff;border-radius:11px;border:1.5px solid var(--border);overflow:hidden}
.hygiene-toolbar{background:#1a2340;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.hygiene-toolbar h4{color:#fff;font-size:12px;font-weight:700}
.hygiene-scroll{overflow-x:auto}
.hygiene-table{width:100%;border-collapse:collapse;font-size:11px;min-width:600px}
.hygiene-table th{background:#f1f5f9;font-weight:700;padding:5px 6px;text-align:center;border:1px solid var(--border);font-size:10px;white-space:nowrap}
.hygiene-table td{padding:3px 5px;border:1px solid var(--border);vertical-align:middle;text-align:center}
.hygiene-table td.name-cell{text-align:left;font-weight:600;min-width:140px}
.hygiene-table td.num-cell{color:var(--muted);font-size:10px;width:30px}
.del-emp-btn{background:none;border:none;color:#f87171;cursor:pointer;font-size:14px;padding:0 2px}
.emp-name-inp{border:none;background:transparent;font-family:var(--font);font-size:11px;font-weight:600;color:var(--text);outline:none;width:100%;min-width:120px}
.emp-name-inp:focus{background:#eff6ff;border-radius:3px;padding:0 3px}
.hyg-cb{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;transition:all .15s;margin:0 auto}
.hyg-cb.ok{background:var(--green-light);border-color:#86efac;color:var(--green)}
.hyg-cb.no{background:var(--red-light);border-color:#fca5a5;color:var(--red)}
.cf-card{background:#fff;border-radius:11px;border:1.5px solid var(--border);overflow:hidden}
.cf-hdr{background:#1a2340;color:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.cf-hdr h4{font-size:12px;font-weight:700}
.cf-tbl{width:100%;border-collapse:collapse;font-size:11px}
.cf-tbl th{background:#f1f5f9;font-weight:700;padding:4px 5px;text-align:center;border:1px solid var(--border);font-size:10px;white-space:nowrap}
.cf-tbl td{padding:2px 4px;border:1px solid var(--border);vertical-align:middle}
.bt-inp{border:none;background:transparent;text-align:center;font-family:var(--hand);font-size:14px;font-weight:600;color:var(--blue);outline:none;width:50px}
.sec-content{display:none}
.sec-content.active{display:block}
.auth-screen{display:none;position:fixed;inset:0;background:#0f172a;z-index:9999;align-items:center;justify-content:center;flex-direction:column}
.auth-screen.visible{display:flex}
.auth-card{background:#1e293b;border-radius:20px;padding:36px 40px;width:340px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.6);text-align:center}
.auth-title{font-size:18px;font-weight:800;color:#fff;margin-bottom:6px}
.auth-sub{font-size:12px;color:#64748b;margin-bottom:24px}
.role-btns{display:flex;gap:10px;margin-bottom:20px}
.role-btn{flex:1;padding:14px 10px;border:2px solid #334155;border-radius:12px;background:#0f172a;color:#94a3b8;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.role-btn.selected{border-color:#60a5fa;color:#fff;background:#1e3a5f;box-shadow:0 0 0 3px rgba(96,165,250,.2)}
.role-btn .role-icon{font-size:26px}
.pin-wrap{display:none;margin-bottom:16px}
.pin-wrap.show{display:block}
.pin-label{font-size:11px;color:#64748b;margin-bottom:6px;text-align:left}
.pin-input{width:100%;border:2px solid #334155;border-radius:10px;padding:10px 14px;background:#0f172a;color:#fff;font-size:18px;font-family:var(--hand);font-weight:700;letter-spacing:8px;text-align:center;outline:none;transition:border-color .2s}
.pin-input:focus{border-color:#60a5fa}
.pin-error{font-size:11px;color:#f87171;margin-top:5px;min-height:16px;display:block}
.auth-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.auth-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.role-badge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.role-badge.admin{background:rgba(250,204,21,.15);color:#fbbf24;border:1px solid rgba(250,204,21,.3)}
.role-badge.staff{background:rgba(148,163,184,.1);color:#94a3b8;border:1px solid rgba(148,163,184,.2)}
.admin-only{display:none!important}
body.is-admin .admin-only{display:flex!important}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;align-items:center;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:#fff;border-radius:16px;padding:28px 26px 22px;width:320px;max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.25);text-align:center}
.confirm-icon{font-size:40px;margin-bottom:12px}
.confirm-title{font-size:16px;font-weight:700;color:#0f172a;margin-bottom:6px}
.confirm-msg{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:10px;border:none;border-radius:9px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer}
.confirm-ok{background:#dc2626;color:#fff}
.confirm-cancel{background:#f1f5f9;color:#64748b}
</style>
</head>
<body>
<header class="app-header">
  <div class="hdr-left">
    <span style="font-size:20px">✅</span>
    <span style="color:#fff;font-weight:800;font-size:15px;letter-spacing:-.3px">Operations Checklists</span>
    <span style="color:rgba(255,255,255,.3);font-size:14px">|</span>
    <span style="color:#94a3b8;font-size:11px;font-weight:600">ALFA.CO</span>
  </div>
  <div class="hdr-right">
    <button class="role-badge btn staff" id="roleBadge" onclick="switchRole()">👨‍🍳 Staff</button>
    <span class="save-ind" id="saveInd">● Auto-save</span>
    <span class="save-ind" id="fbStatus" style="color:#94a3b8">☁ Connecting...</span>
    <button class="btn btn-blue admin-only" onclick="window.print()">🖨 Print</button>
  </div>
</header>
<div class="sec-tabs">
  <button class="sec-tab active" onclick="switchSec('mod',this)">🔱 MOD</button>
  <button class="sec-tab" onclick="switchSec('foh',this)">🍽 FOH</button>
  <button class="sec-tab" onclick="switchSec('boh',this)">👨‍🍳 BOH</button>
  <button class="sec-tab" onclick="switchSec('forms',this)">📋 Control Forms</button>
</div>
<div class="meta-bar">
  <label>Branch:</label><input type="text" id="branch" value="MOA" style="width:60px" oninput="syncMeta()">
  <label>Week:</label><input type="date" id="periodStart" oninput="onPeriodChange()">
  <label>Period:</label><input type="text" id="periodLabel" value="MAR 22-28, 2026" style="width:130px" oninput="syncMeta()">
  <label>MOD:</label><input type="text" id="modName" placeholder="Name" style="width:100px" oninput="syncMeta()">
</div>
<div class="sec-content active" id="sec-mod">
  <div class="cl-tabs" id="mod-cltabs"></div>
  <div class="cl-hdr"><h2 id="mod-title">MOD Checklist</h2><div class="sub" id="mod-sub"></div></div>
  <div class="prog-wrap"><div class="prog-bar" id="mod-prog"></div></div>
  <div class="prog-lbl" id="mod-proglbl"></div>
  <div class="day-tabs" id="mod-daytabs"></div>
  <div class="cards-wrap" id="mod-cards"></div>
</div>
<div class="sec-content" id="sec-foh">
  <div class="cl-tabs" id="foh-cltabs"></div>
  <div class="cl-hdr"><h2 id="foh-title">FOH Checklist</h2><div class="sub" id="foh-sub"></div></div>
  <div class="prog-wrap"><div class="prog-bar" id="foh-prog"></div></div>
  <div class="prog-lbl" id="foh-proglbl"></div>
  <div class="day-tabs" id="foh-daytabs"></div>
  <div class="cards-wrap" id="foh-cards"></div>
</div>
<div class="sec-content" id="sec-boh">
  <div class="cl-tabs" id="boh-cltabs"></div>
  <div class="cl-hdr"><h2 id="boh-title">BOH Checklist</h2><div class="sub" id="boh-sub"></div></div>
  <div class="prog-wrap"><div class="prog-bar" id="boh-prog"></div></div>
  <div class="prog-lbl" id="boh-proglbl"></div>
  <div class="day-tabs" id="boh-daytabs"></div>
  <div class="cards-wrap" id="boh-cards"></div>
</div>
<div class="sec-content" id="sec-forms">
  <div class="cl-tabs" id="forms-cltabs"></div>
  <div class="cl-hdr"><h2 id="forms-title">Control Form</h2><div class="sub" id="forms-sub"></div></div>
  <div class="cards-wrap" id="forms-cards" style="padding-top:6px"></div>
</div>
<!-- AUTH -->
<div class="auth-screen visible" id="authScreen">
  <div class="auth-card">
    <div style="font-size:36px;margin-bottom:12px">✅</div>
    <div class="auth-title">Operations Checklists</div>
    <div class="auth-sub">Select your role to continue</div>
    <div class="role-btns">
      <button class="role-btn" id="roleStaff" onclick="selectRole('staff')">
        <span class="role-icon">👨‍🍳</span><span>Staff</span>
        <span style="font-size:10px;font-weight:400;color:#64748b">Fill checklists</span>
      </button>
      <button class="role-btn" id="roleAdmin" onclick="selectRole('admin')">
        <span class="role-icon">🔐</span><span>Admin</span>
        <span style="font-size:10px;font-weight:400;color:#64748b">Full access</span>
      </button>
    </div>
    <div class="pin-wrap" id="pinWrap">
      <div class="pin-label">🔐 Enter Admin PIN</div>
      <input type="password" class="pin-input" id="pinInput" maxlength="6" placeholder="••••" oninput="onPinInput()" onkeydown="if(event.key==='Enter')doLogin()">
      <span class="pin-error" id="pinError"></span>
    </div>
    <button class="auth-btn" id="loginBtn" onclick="doLogin()" disabled>Enter</button>
  </div>
</div>
<!-- CONFIRM -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirmIcon">⚠️</div>
    <div class="confirm-title" id="confirmTitle">Are you sure?</div>
    <div class="confirm-msg" id="confirmMsg">This cannot be undone.</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="confirmCancel()">Cancel</button>
      <button class="confirm-ok" id="confirmOkBtn" onclick="confirmOk()">Delete</button>
    </div>
  </div>
</div>
<script>
// Firebase Config — same Ops Hub project
const FB_CONFIG={apiKey:"AIzaSyB9DhSn5gDqAhpmLG9aVFAld1dSRYJWFDI",authDomain:"opshub-f802f.firebaseapp.com",databaseURL:"https://opshub-f802f-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"opshub-f802f",storageBucket:"opshub-f802f.firebasestorage.app",messagingSenderId:"84176854270",appId:"1:84176854270:web:f7a66b3b38e98b630859af",measurementId:"G-X2R22YGJPW"};
let fbApp,fbDb,fbRef;
function initFB(){try{fbApp=firebase.apps.length?firebase.apps[0]:firebase.initializeApp(FB_CONFIG);fbDb=firebase.database(fbApp);setupFBSync();}catch(e){console.warn('FB:',e);setFBSt('offline');}}
function getFBPath(){const b=(document.getElementById('branch')?.value||'MOA').toUpperCase().replace(/[.#$/\[\]]/g,'_');return 'ops_checklists/'+b;}
function setFBSt(st){const el=document.getElementById('fbStatus');if(!el)return;el.innerHTML=st==='live'?'⚡ Live':st==='offline'?'⚠ Offline':'☁ Connecting...';el.style.color=st==='live'?'#4ade80':st==='offline'?'#f87171':'#94a3b8';}
function setupFBSync(){if(fbRef)fbRef.off();fbRef=fbDb.ref(getFBPath());fbRef.on('value',snap=>{const d=snap.val();if(d&&d.state){ST=d.state;if(d.meta){const m=d.meta;['branch','periodLabel','modName','periodStart'].forEach(k=>{const el=document.getElementById(k);if(el&&m[k])el.value=m[k];});}if(currentRole)renderSec(curSec);}setFBSt('live');},()=>setFBSt('offline'));}

// DATA

mod:[

{name:‘CHILLER’,items:[{id:‘chiller2d’,label:‘2 Door Chiller 0-5°C’,yellow:true,hasTemp:true},{id:‘onion’,label:‘Onion, Tomato, Italian Dressing’,yellow:false,hasTemp:false}]}
]},

const di=curDay[sec]||0;
const tw=document.getElementById(sec+’-cltabs’);tw.innerHTML=’’;
cls.forEach((c,i)=>{const b=document.createElement(‘button’);b.className=‘cl-tab’+(i===ci?’ active’:’’);b.textContent=c.name;b.onclick=()=>{curCl[sec]=i;renderSec(sec);};tw.appendChild(b);});
document.getElementById(sec+’-title’).textContent=cl.name;
document.getElementById(sec+’-sub’).textContent=cl.sub||’’;
if(cl.checkType===‘hygiene’){document.getElementById(sec+’-prog’).style.width=‘0%’;document.getElementById(sec+’-proglbl’).textContent=’’;document.getElementById(sec+’-daytabs’).innerHTML=’’;renderHygieneTable(document.getElementById(sec+’-cards’),cl);return;}
if(cl.checkType===‘bartender’){document.getElementById(sec+’-prog’).style.width=‘0%’;document.getElementById(sec+’-proglbl’).textContent=’’;document.getElementById(sec+’-daytabs’).innerHTML=’’;renderBartenderForm(document.getElementById(sec+’-cards’),cl);return;}
const dw=document.getElementById(sec+’-daytabs’);dw.innerHTML=’’;
weekDates.forEach((d,dIdx)=>{
const b=document.createElement(‘button’);b.className=‘day-tab’+(dIdx===di?’ active’:’’);
const st=dayStatus(cl,dIdx);if(st===‘done’)b.classList.add(‘done’);else if(st===‘partial’)b.classList.add(‘partial’);
b.innerHTML=DAYS[d.getDay()]+’ ‘+fmtD(d)+’<span class="dot"></span>’;
b.onclick=()=>{curDay[sec]=dIdx;renderSec(sec);};dw.appendChild(b);
});
renderCards(sec,cl,di);
let tot=0,done=0;
(cl.groups||[]).flatMap(g=>g.items||[]).forEach(item=>{SHIFTS.forEach(sh=>{tot++;const s=S(cl.id,di,item.id,sh);if(s&&s.v)done++;});});
const pct=tot?Math.round(done/tot*100):0;
const pb=document.getElementById(sec+’-prog’),pl=document.getElementById(sec+’-proglbl’);
if(pb)pb.style.width=pct+’%’;if(pl)pl.textContent=done+’/’+tot+’ items  ‘+pct+’%’;
}catch(e){console.error(‘renderSec:’,e);}
}

function dayStatus(cl,di){ensureST();let tot=0,fil=0;if(!cl.groups)return’empty’;cl.groups.flatMap(g=>g.items||[]).forEach(item=>{SHIFTS.forEach(sh=>{tot++;const s=S(cl.id,di,item.id,sh);if(s.v!==null)fil++;});});return fil===0?‘empty’:fil===tot?‘done’:‘partial’;}

function renderCards(sec,cl,di){
const wrap=document.getElementById(sec+’-cards’);if(!wrap)return;wrap.innerHTML=’’;ensureST();let delay=0;
(cl.groups||[]).forEach(grp=>{
const d=document.createElement(‘div’);d.className=‘grp-div’;d.style.animationDelay=(delay*15)+‘ms’;d.textContent=grp.name;wrap.appendChild(d);
(grp.items||[]).forEach(item=>{
const amS=S(cl.id,di,item.id,‘AM’),pmS=S(cl.id,di,item.id,‘PM’);
const allOk=[amS,pmS].every(s=>s.v===‘ok’||s.v===‘yes’),anyNo=[amS,pmS].some(s=>s.v===‘no’);
const card=document.createElement(‘div’);card.className=‘item-card’+(allOk?’ all-ok’:anyNo?’ has-no’:’’);card.style.animationDelay=(delay*15)+‘ms’;delay++;
card.innerHTML=`<div class="card-inner"><div class="card-top"><div class="card-lbl"><span class="badge ${item.yellow?'key':''}">${item.yellow?'⭐ KEY ITEM':'CHECK'}</span><div class="item-q">${xe(item.label)}</div></div><button class="flag-btn ${SF(cl.id,di,item.id).flagged?'on':''}" onclick="toggleFlag('${cl.id}',${di},'${item.id}',this)">🚩</button></div><div class="shifts-row">${SHIFTS.map(sh=>buildShift(cl,di,item,sh)).join('')}</div><button class="cmt-btn" onclick="toggleCmt(this)">+ Add Comment</button><div class="cmt-box ${amS.comment?'open':''}"><textarea placeholder="Write comment..." oninput="setComment('${cl.id}',${di},'${item.id}',this.value)">${xe(amS.comment||'')}</textarea></div></div>`;
wrap.appendChild(card);
});
});
}

function buildShift(cl,di,item,sh){
const s=S(cl.id,di,item.id,sh),ct=cl.checkType;
let c=’’;
if(ct===‘temp’){c=`<div class="ctrl-row"><span class="ctrl-lbl">Overall</span><div class="yn-grp"><button class="yn-btn ${s.v==='yes'?'yes':''}" onclick="setV('${cl.id}',${di},'${item.id}','${sh}','yes')">✓ YES</button><button class="yn-btn ${s.v==='no'?'no':''}" onclick="setV('${cl.id}',${di},'${item.id}','${sh}','no')">✗ NO</button></div></div>${item.hasTemp?`<div class="ctrl-row"><span class="ctrl-lbl">Temp °C</span><input class="temp-inp ${s.temp?'has-val':''}" type="text" maxlength="6" placeholder="–" value="${xe(s.temp)}" oninput="setTemp('${cl.id}',${di},'${item.id}','${sh}',this)"></div>`:''}`;
}else if(ct===‘yn’){c=`<div class="ctrl-row"><span class="ctrl-lbl">Check</span><div class="yn-grp"><button class="yn-btn ${s.v==='yes'?'yes':''}" onclick="setV('${cl.id}',${di},'${item.id}','${sh}','yes')">✓ YES</button><button class="yn-btn ${s.v==='no'?'no':''}" onclick="setV('${cl.id}',${di},'${item.id}','${sh}','no')">✗ NO</button></div></div>`;
}else{c=`<div class="ctrl-row"><span class="ctrl-lbl">Check</span><div class="cb-grp"><div class="cb-item" onclick="setV('${cl.id}',${di},'${item.id}','${sh}','ok')"><div class="cb-box ${s.v==='ok'?'ok':''}">✓</div><span class="cb-lbl">Done</span></div><div class="cb-item" onclick="setV('${cl.id}',${di},'${item.id}','${sh}','no')"><div class="cb-box ${s.v==='no'?'no':''}">✗</div><span class="cb-lbl">Issue</span></div></div></div>`;}
return `<div class="shift-blk"><div class="sh-title">${sh} SHIFT</div>${c}</div>`;
}

function setV(clId,di,itemId,sh,val){ensureST();const s=S(clId,di,itemId,sh);s.v=s.v===val?null:val;save();const sec=findSec(clId);renderCards(sec,CL[sec][curCl[sec]],di);renderSec(sec);}
function setTemp(clId,di,itemId,sh,el){ensureST();S(clId,di,itemId,sh).temp=el.value;el.className=‘temp-inp’+(el.value?’ has-val’:’’);save();}
function setComment(clId,di,itemId,val){ensureST();SHIFTS.forEach(sh=>S(clId,di,itemId,sh).comment=val);save();}
function toggleFlag(clId,di,itemId,btn){ensureST();SF(clId,di,itemId).flagged=!SF(clId,di,itemId).flagged;btn.classList.toggle(‘on’);save();}
function toggleCmt(btn){const box=btn.nextElementSibling;box.classList.toggle(‘open’);btn.textContent=box.classList.contains(‘open’)?’- Hide Comment’:’+ Add Comment’;}
function findSec(clId){for(const sec of[‘mod’,‘foh’,‘boh’])if((CL[sec]||[]).find(c=>c.id===clId))return sec;return’mod’;}

function renderHygieneTable(wrap,cl){
wrap.innerHTML=’’;ensureST();const w=wk(),hid=cl.id,hyg=ST[w][hid];
const dayWrap=document.createElement(‘div’);dayWrap.className=‘day-tabs’;dayWrap.style.padding=‘8px 0 0’;
weekDates.forEach((d,di)=>{const b=document.createElement(‘button’);b.className=‘day-tab’+(di===curDay.foh?’ active’:’’);b.innerHTML=DAYS[d.getDay()]+’ ‘+fmtD(d);b.onclick=()=>{curDay.foh=di;renderSec(‘foh’);};dayWrap.appendChild(b);});
wrap.appendChild(dayWrap);
const di=curDay.foh;if(!hyg.checks[di])hyg.checks[di]={};const checks=hyg.checks[di];
const shortCols=[‘Hair’,‘Moustache’,‘Nails’,‘Physical’,‘No Jewelry’,‘Uniform’,‘Name Tag’,‘Baladiya’,‘Blk Shoes’,‘Belt’,‘Ballpen’,‘Core Val.’,‘Mask’,‘Temp<38’,‘Health’,‘Remarks’];
const container=document.createElement(‘div’);container.className=‘hygiene-wrap’;container.style.marginTop=‘8px’;
const toolbar=document.createElement(‘div’);toolbar.className=‘hygiene-toolbar’;
toolbar.innerHTML=`<h4>👥 ${cl.section==='FOH'?'Front of House':'Heart of House'} — ${DAYS[weekDates[di].getDay()]} ${fmtD(weekDates[di])}</h4>${isAdmin()?`<button class="btn btn-green" style="font-size:11px;padding:5px 10px" onclick="addEmployee('${hid}',${di})">+ Add Employee</button>`:''}`;
container.appendChild(toolbar);
const scroll=document.createElement(‘div’);scroll.className=‘hygiene-scroll’;
let thead=`<thead><tr><th>#</th><th style="text-align:left;min-width:150px">Employee Name</th><th>SAP</th>${shortCols.map(c=>`<th style="font-size:9px;min-width:38px">${c}</th>`).join('')}<th></th></tr></thead>`;
let tbody=’<tbody>’;
(hyg.employees||[]).forEach((emp,ei)=>{
if(!checks[ei])checks[ei]={};
tbody+=`<tr><td class="num-cell">${ei+1}</td><td class="name-cell"><input class="emp-name-inp" type="text" value="${xe(emp.name||'')}" placeholder="Employee name" oninput="setEmpName('${hid}',${ei},this.value)"></td><td style="font-size:9px"><input class="emp-name-inp" type="text" value="${xe(emp.sap||'')}" placeholder="SAP#" style="width:55px;font-size:9px" oninput="setEmpSap('${hid}',${ei},this.value)"></td>${shortCols.map((_,ci)=>{const v=checks[ei]&&checks[ei][ci];return `<td><div class="hyg-cb ${v==='ok'?'ok':v==='no'?'no':''}" onclick="setHyg('${hid}',${di},${ei},${ci},this)">${v===‘ok’?‘✓’:v===‘no’?‘✗’:’’}</div></td>`;}).join('')}<td>${isAdmin()?`<button class="del-emp-btn" onclick="delEmployee('${hid}',${di},${ei})">🗑</button>`:''}</td></tr>`;
});
if(isAdmin())tbody+=`<tr><td colspan="${4+shortCols.length}" style="text-align:center;padding:6px"><button class="btn btn-green" style="font-size:11px;padding:5px 12px" onclick="addEmployee('${hid}',${di})">+ Add Employee</button></td></tr>`;
tbody+=’</tbody>’;
const table=document.createElement(‘table’);table.className=‘hygiene-table’;table.innerHTML=thead+tbody;
scroll.appendChild(table);container.appendChild(scroll);wrap.appendChild(container);
}
function addEmployee(hid,di){ensureST();ST[wk()][hid].employees.push({name:’’,sap:’’});save();renderSec(‘foh’);}
async function delEmployee(hid,di,ei){
const ok=await showConfirm(‘Delete Employee’,‘Remove this employee?’,‘Delete’,‘🗑️’);if(!ok)return;
ensureST();const w=wk();ST[w][hid].employees.splice(ei,1);
for(let d=0;d<7;d++){if(ST[w][hid].checks[d]){const nc={};Object.keys(ST[w][hid].checks[d]).forEach(k=>{const ki=parseInt(k);if(ki<ei)nc[ki]=ST[w][hid].checks[d][k];else if(ki>ei)nc[ki-1]=ST[w][hid].checks[d][k];});ST[w][hid].checks[d]=nc;}}
save();renderSec(‘foh’);
}
function setEmpName(hid,ei,val){ensureST();ST[wk()][hid].employees[ei].name=val;save();}
function setEmpSap(hid,ei,val){ensureST();ST[wk()][hid].employees[ei].sap=val;save();}
function setHyg(hid,di,ei,ci,box){
ensureST();const w=wk();if(!ST[w][hid].checks[di])ST[w][hid].checks[di]={};if(!ST[w][hid].checks[di][ei])ST[w][hid].checks[di][ei]={};
const cur=ST[w][hid].checks[di][ei][ci];const next=cur===null||cur===undefined?‘ok’:cur===‘ok’?‘no’:null;
ST[w][hid].checks[di][ei][ci]=next;box.className=‘hyg-cb’+(next===‘ok’?’ ok’:next===‘no’?’ no’:’’);box.innerHTML=next===‘ok’?‘✓’:next===‘no’?‘✗’:’’;save();
}

function renderBartenderForm(wrap,cl){
wrap.innerHTML=’’;ensureST();const w=wk(),bt=ST[w][‘foh_bartender’],di=window[’_btDay’]||0;
const dayRow=document.createElement(‘div’);dayRow.style.cssText=‘display:flex;gap:6px;overflow-x:auto;padding:0 0 8px;scrollbar-width:none’;
weekDates.forEach((d,dIdx)=>{const b=document.createElement(‘button’);b.className=‘day-tab’+(dIdx===di?’ active’:’’);b.innerHTML=DAYS[d.getDay()]+’ ‘+fmtD(d);b.onclick=()=>{window[’_btDay’]=dIdx;renderBartenderForm(wrap,cl);};dayRow.appendChild(b);});
wrap.appendChild(dayRow);
const card=document.createElement(‘div’);card.className=‘cf-card’;
const hdr=document.createElement(‘div’);hdr.className=‘cf-hdr’;hdr.innerHTML=`<h4>🍸 Bartender's Prep Sheet — ${DAYS[weekDates[di].getDay()]} ${fmtD(weekDates[di])}</h4><div style="font-size:10px;color:#93c5fd">■ OH ■ PAR ■ TO PREP</div>`;card.appendChild(hdr);
const scroll=document.createElement(‘div’);scroll.className=‘cf-scroll’;
const table=document.createElement(‘table’);table.className=‘cf-tbl’;table.style.minWidth=‘420px’;
table.innerHTML=`<thead><tr><th style="text-align:left;min-width:200px">Item</th><th style="width:60px">Shelf Life</th><th style="width:40px">UOM</th><th style="width:60px;background:#dbeafe;color:#1e40af">OH</th><th style="width:60px;background:#dcfce7;color:#166534">PAR</th><th style="width:60px;background:#fef9c3;color:#92400e">TO PREP</th></tr></thead>`;
const tbody=document.createElement(‘tbody’);
const renderSect=(secName,items)=>{
const catTr=document.createElement(‘tr’);catTr.innerHTML=`<td colspan="6" style="background:#1e3a5f;color:#fff;font-weight:700;padding:5px 10px;font-size:11px">${secName}</td>`;tbody.appendChild(catTr);
items.forEach((item,ri)=>{
const bd=bt[item]||{sl:’’,uom:’’,prep:{}},pd=(bd.prep&&bd.prep[di])||{oh:’’,par:’’,prep:’’};
const tr=document.createElement(‘tr’);tr.style.background=ri%2===0?’#fff’:’#f8fafc’;
tr.innerHTML=`<td style="text-align:left;font-weight:600;font-size:11.5px;padding:5px 10px">${xe(item)}</td><td><input class="bt-inp" type="text" value="${xe(bd.sl||'')}" placeholder="–" style="width:56px" oninput="setBT('${item.replace(/'/g,"\\'")}','sl',this.value)"></td><td><input class="bt-inp" type="text" value="${xe(bd.uom||'')}" placeholder="–" style="width:40px;font-weight:700" oninput="setBT('${item.replace(/'/g,"\\'")}','uom',this.value)"></td><td style="background:#eff6ff"><input class="bt-inp" type="number" value="${pd.oh}" placeholder="0" style="width:54px;background:transparent;color:#1e40af;font-weight:700" oninput="setBTday('${item.replace(/'/g,"\\'")}',${di},'oh',this.value)"></td><td style="background:#f0fdf4"><input class="bt-inp" type="number" value="${pd.par}" placeholder="0" style="width:54px;background:transparent;color:#166534;font-weight:700" oninput="setBTday('${item.replace(/'/g,"\\'")}',${di},'par',this.value)"></td><td style="background:#fffbeb"><input class="bt-inp" type="number" value="${pd.prep}" placeholder="0" style="width:54px;background:transparent;color:#92400e;font-weight:700" oninput="setBTday('${item.replace(/'/g,"\\'")}',${di},'prep',this.value)"></td>`;
tbody.appendChild(tr);
});
};
renderSect(‘CHILLER’,BT_ITEMS.chiller);renderSect(‘BASES AND SYRUPS’,BT_ITEMS.bases);
table.appendChild(tbody);scroll.appendChild(table);card.appendChild(scroll);
const footer=document.createElement(‘div’);footer.style.cssText=‘padding:8px 12px;font-size:11px;color:#64748b;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;gap:24px’;
footer.innerHTML=’<span><b>Checked By:</b> ___________________________</span><span><b>Verified by MOD:</b> ___________________________</span>’;card.appendChild(footer);wrap.appendChild(card);
}
function setBT(item,field,val){ensureST();if(!ST[wk()][‘foh_bartender’][item])ST[wk()][‘foh_bartender’][item]={sl:’’,uom:’’,prep:{}};ST[wk()][‘foh_bartender’][item][field]=val;save();}
function setBTday(item,di,field,val){ensureST();const bt=ST[wk()][‘foh_bartender’];if(!bt[item])bt[item]={sl:’’,uom:’’,prep:{}};if(!bt[item].prep)bt[item].prep={};if(!bt[item].prep[di])bt[item].prep[di]={oh:’’,par:’’,prep:’’};bt[item].prep[di][field]=val;save();}

function syncMeta(){if(fbRef)fbRef.off();if(fbDb)setupFBSync();save();}
function onPeriodChange(){weekDates=getWeekDates(document.getElementById(‘periodStart’).value);curDay={mod:0,foh:0,boh:0};ensureST();renderSec(curSec);save();}

// AUTH
function selectRole(role){
_selectedRole=role;
document.getElementById(‘roleStaff’).classList.toggle(‘selected’,role===‘staff’);
document.getElementById(‘roleAdmin’).classList.toggle(‘selected’,role===‘admin’);
if(role===‘admin’){document.getElementById(‘pinWrap’).classList.add(‘show’);document.getElementById(‘loginBtn’).disabled=true;document.getElementById(‘pinInput’).focus();}
else{document.getElementById(‘pinWrap’).classList.remove(‘show’);document.getElementById(‘pinError’).textContent=’’;document.getElementById(‘loginBtn’).disabled=false;}
}
function onPinInput(){const v=document.getElementById(‘pinInput’).value;document.getElementById(‘loginBtn’).disabled=v.length<1;document.getElementById(‘pinError’).textContent=’’;}
function switchRole(){
currentRole=null;_selectedRole=null;document.body.classList.remove(‘is-admin’);
[‘roleStaff’,‘roleAdmin’].forEach(id=>document.getElementById(id).classList.remove(‘selected’));
document.getElementById(‘pinWrap’).classList.remove(‘show’);document.getElementById(‘pinInput’).value=’’;document.getElementById(‘pinError’).textContent=’’;document.getElementById(‘loginBtn’).disabled=true;
document.getElementById(‘authScreen’).classList.add(‘visible’);
}
function isAdmin(){return currentRole===‘admin’;}
function doLogin(){
if(!_selectedRole)return;
if(_selectedRole===‘admin’){const pin=document.getElementById(‘pinInput’).value;if(pin!==ADMIN_PIN){document.getElementById(‘pinError’).textContent=‘Incorrect PIN.’;document.getElementById(‘pinInput’).value=’’;document.getElementById(‘loginBtn’).disabled=true;return;}}
currentRole=_selectedRole;document.getElementById(‘authScreen’).classList.remove(‘visible’);
if(currentRole===‘admin’)document.body.classList.add(‘is-admin’);
const badge=document.getElementById(‘roleBadge’);if(badge){badge.className=’role-badge btn ’+(currentRole===‘admin’?‘admin’:‘staff’);badge.innerHTML=currentRole===‘admin’?‘🔐 Admin’:‘👨‍🍳 Staff’;}
renderSec(curSec);
}

// CONFIRM
let _confirmResolve=null;
function showConfirm(title,msg,okLabel=‘Delete’,icon=‘⚠️’){return new Promise(resolve=>{_confirmResolve=resolve;document.getElementById(‘confirmIcon’).innerHTML=icon;document.getElementById(‘confirmTitle’).textContent=title;document.getElementById(‘confirmMsg’).textContent=msg;document.getElementById(‘confirmOkBtn’).textContent=okLabel;document.getElementById(‘confirmOverlay’).classList.add(‘open’);});}
function confirmOk(){document.getElementById(‘confirmOverlay’).classList.remove(‘open’);if(_confirmResolve){_confirmResolve(true);_confirmResolve=null;}}
function confirmCancel(){document.getElementById(‘confirmOverlay’).classList.remove(‘open’);if(_confirmResolve){_confirmResolve(false);_confirmResolve=null;}}

document.addEventListener(‘DOMContentLoaded’,()=>{
const ps=document.getElementById(‘periodStart’);
if(ps&&!ps.value){const now=new Date();ps.value=now.getFullYear()+’-’+String(now.getMonth()+1).padStart(2,‘0’)+’-’+String(now.getDate()).padStart(2,‘0’);}
weekDates=getWeekDates(document.getElementById(‘periodStart’).value);
curDay={mod:0,foh:0,boh:0};
try{const s=localStorage.getItem(‘cl_st’);if(s)ST=JSON.parse(s);const m=localStorage.getItem(‘cl_mt’);if(m){const meta=JSON.parse(m);[‘branch’,‘periodLabel’,‘modName’,‘periodStart’].forEach(k=>{const el=document.getElementById(k);if(el&&meta[k]&&!el.value)el.value=meta[k];});}}catch(e){}
ensureST();
initFB();
});
</script>

</body>
</html>
