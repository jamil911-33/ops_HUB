<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Operations Checklists — ALFA.CO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --acc:#f0a500;--acc2:#f5be45;--acc-glow:rgba(240,165,0,.15);
  --grn:#34d399;--red:#f87171;--gold:#f0a500;--blu:#60a5fa;
  --pur:#c084fc;--cyn:#22d3ee;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --bg:transparent;--bg2:rgba(255,255,255,0.038);--bg3:rgba(255,255,255,0.028);--bg4:rgba(255,255,255,0.018);
  --bd:rgba(255,255,255,0.10);--bd2:rgba(255,255,255,0.15);--bd3:rgba(255,255,255,0.22);
  --text:rgba(255,255,255,0.92);--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.36);
  --input-bg:rgba(255,255,255,0.07);--input-border:rgba(255,255,255,0.13);
  --modal-bg:rgba(10,14,26,0.95);--overlay-bg:rgba(0,0,0,0.72);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--font);color:var(--text);font-size:13.5px;-webkit-font-smoothing:antialiased;overflow:hidden;
  background:radial-gradient(ellipse at 20% 30%,rgba(99,102,241,0.28) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 70%,rgba(236,72,153,0.16) 0%,transparent 50%),
             linear-gradient(160deg,#050810 0%,#090d1a 100%);}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* APP SHELL */
#app{display:none;flex-direction:column;height:100vh}
#app-header{background:rgba(8,12,24,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#f0a500,#c8700a);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
#hdr-branch-name{font-size:14px;font-weight:700;color:var(--text)}
#hdr-branch-sub{font-size:10px;color:var(--text3);font-family:var(--mono)}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);margin-left:auto;flex-shrink:0;
  box-shadow:0 0 6px var(--grn);animation:pulse 2s infinite}
.conn-dot.off{background:var(--red);box-shadow:0 0 6px var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#cl-outer{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
#cl-wrap{flex:1;min-height:0;display:flex;flex-direction:column;position:relative}
#cl-auth-overlay{border-radius:0}

/* BRANCH SELECTOR */
#branch-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse at 20% 30%,rgba(99,102,241,0.30) 0%,transparent 55%),
             linear-gradient(160deg,#050810 0%,#090d1a 100%)}
#branch-screen.gone{display:none}
.bs-card{background:rgba(255,255,255,.055);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:28px;width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,.5)}
.bs-list{display:flex;flex-direction:column;gap:7px;max-height:340px;overflow-y:auto;margin-bottom:14px}
.bs-btn{display:flex;align-items:center;gap:11px;width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:11px 13px;cursor:pointer;
  text-align:left;transition:all .15s;font-family:var(--font);color:var(--text)}
.bs-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18)}
.pin-back{background:none;border:none;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;
  padding:0 0 12px;font-family:var(--font);display:flex;align-items:center;gap:6px}
.pin-inp{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.13);border-radius:10px;
  padding:13px 16px;color:rgba(255,255,255,.9);font-size:22px;font-family:monospace;letter-spacing:8px;
  text-align:center;outline:none;margin:8px 0 4px;transition:border-color .2s}
.pin-inp:focus{border-color:var(--acc)}
.pin-err{font-size:11px;color:var(--red);min-height:16px;margin-bottom:8px;text-align:center}
.pin-submit{width:100%;padding:13px;background:linear-gradient(135deg,#f0a500,#d97706);color:#000;
  border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font)}

/* LOADING */
#loading{position:fixed;inset:0;background:#050810;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;z-index:300}
#loading.gone{display:none}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--acc);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;
  background:linear-gradient(135deg,#f0a500,#d97706);color:#000;border:none;border-radius:20px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s}
.btn:hover{opacity:.85}
.btn.s{background:rgba(255,255,255,.08);color:var(--text2);border:1px solid var(--bd2);color:var(--text2)}
.btn.sm{font-size:11px;padding:5px 10px}
.btn.sm.s{background:rgba(255,255,255,.06);color:var(--text3);border:1px solid var(--bd)}
.btn.g{background:linear-gradient(135deg,#34d399,#059669);color:#fff}
.btn.d{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3)}

/* TOASTS */
.toast{background:rgba(22,27,34,.95);border:1px solid var(--bd2);border-radius:10px;
  padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:9px;
  box-shadow:0 8px 24px rgba(0,0,0,.5);animation:toastIn .25s ease;pointer-events:all}
.toast.success{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.06)}
.toast.error{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.06)}
.toast.warning,.toast.w{border-color:rgba(240,165,0,.3);background:rgba(240,165,0,.06)}
.toast.info{border-color:rgba(96,165,250,.3);background:rgba(96,165,250,.06)}
@keyframes toastIn{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}

/* ══ CHECKLIST MODULE ══ */
.cl-sec-tabs{display:flex;background:var(--bg2);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:0 4px;gap:0;flex-shrink:0}
.cl-sec-tab{padding:8px 14px;font-size:11.5px;font-weight:700;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--font);transition:all .2s;white-space:nowrap}
.cl-sec-tab:hover{color:var(--text2)}
.cl-sec-tab.active{color:var(--acc2);border-bottom-color:var(--acc)}
.cl-meta{background:var(--bg2);backdrop-filter:blur(10px);border-bottom:1px solid var(--bd);padding:6px 12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:11px;flex-shrink:0}
.cl-meta label{color:var(--text3);font-weight:600;white-space:nowrap;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.cl-meta input,.cl-meta select{background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:11px;font-family:var(--mono);outline:none}
.cl-meta input:focus,.cl-meta select:focus{border-color:var(--acc)}
.cl-sub-tabs{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 8px;display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.cl-sub-tabs::-webkit-scrollbar{display:none}
.cl-sub-tab{flex-shrink:0;padding:7px 12px;font-size:11px;font-weight:700;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:var(--font);margin-bottom:-1px}
.cl-sub-tab.active{color:var(--blu);border-bottom-color:var(--blu)}
.cl-hdr-bar{padding:8px 14px 2px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cl-hdr-bar h3{font-size:13px;font-weight:700;color:var(--blu);margin:0}
.cl-hdr-bar .sub{font-size:10px;color:var(--text3);font-family:var(--mono)}
.cl-prog-wrap{margin:0 14px 2px;background:var(--bd);border-radius:99px;height:3px;overflow:hidden;flex-shrink:0}
.cl-prog-bar{height:100%;background:linear-gradient(90deg,var(--blu),var(--cyn));border-radius:99px;transition:width .4s}
.cl-prog-lbl{font-size:9px;color:var(--text3);margin:1px 14px 0;text-align:right;font-family:var(--mono);flex-shrink:0}
.cl-day-tabs{display:flex;overflow-x:auto;gap:5px;padding:6px 12px 0;scrollbar-width:none;flex-shrink:0;align-items:center}
.cl-day-tabs::-webkit-scrollbar{display:none}
.cl-day-tab{flex-shrink:0;padding:4px 9px;border-radius:20px;border:1px solid var(--bd2);background:var(--bg3);font-size:10px;font-weight:600;cursor:pointer;color:var(--text3);transition:all .15s;white-space:nowrap;font-family:var(--mono)}
.cl-day-tab.active{background:var(--blu);border-color:var(--blu);color:#fff}
.cl-day-tab.done{border-color:var(--grn);color:var(--grn);background:rgba(63,185,80,.12)}
.cl-day-tab.partial{border-color:var(--gold);color:var(--gold);background:rgba(240,165,0,.10)}
.cl-day-tab.active.done{background:var(--grn);border-color:var(--grn);color:#fff}
.cl-day-tab.active.partial{background:var(--gold);border-color:var(--gold);color:#000}
.cl-cards{padding:8px 12px 40px;display:flex;flex-direction:column;gap:7px;overflow-y:auto;overflow-x:hidden;flex:1;min-height:0}
.cl-grp-div{background:linear-gradient(90deg,var(--bg4),var(--bg3));border-radius:7px;padding:6px 11px;color:var(--text3);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-left:2px solid var(--blu)}
.cl-item-card{background:var(--bg2);border-radius:9px;border:1px solid var(--bd);transition:border-color .2s}
.cl-item-card.all-ok{border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.04)}
.cl-item-card.has-no{border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.04)}
.cl-card-inner{padding:9px 11px 7px}
.cl-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.cl-badge{display:inline-block;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);background:var(--bg3);padding:1px 5px;border-radius:3px;margin-bottom:2px}
.cl-badge.key{background:rgba(240,165,0,.15);color:var(--gold)}
.cl-item-q{font-size:12px;font-weight:600;line-height:1.4;color:var(--text)}
.cl-flag-btn{background:none;border:1px solid var(--bd2);border-radius:5px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;flex-shrink:0;transition:all .15s}
.cl-flag-btn.on{background:rgba(248,81,73,.15);border-color:var(--red)}
.cl-shifts-row{display:flex;gap:6px;flex-wrap:wrap}
.cl-shift-blk{flex:1;min-width:120px;background:var(--bg3);border-radius:7px;padding:5px 7px 4px}
.cl-sh-title{font-size:8px;font-weight:800;color:var(--text3);letter-spacing:.5px;margin-bottom:4px;font-family:var(--mono)}
.cl-ctrl-row{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.cl-ctrl-lbl{font-size:9px;font-weight:700;color:var(--text3);min-width:55px;flex-shrink:0;font-family:var(--mono)}
.cl-yn-grp{display:flex;gap:3px}
.cl-yn-btn{padding:4px 9px;border-radius:6px;border:1px solid var(--bd2);background:var(--bg4);font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--text3);font-family:var(--font)}
.cl-yn-btn.yes{background:rgba(63,185,80,.15);border-color:var(--grn);color:var(--grn)}
.cl-yn-btn.no{background:rgba(248,81,73,.15);border-color:var(--red);color:var(--red)}
.cl-cb-grp{display:flex;gap:5px}
.cl-cb-item{display:flex;align-items:center;gap:3px;cursor:pointer;user-select:none}
.cl-cb-box{width:20px;height:20px;border-radius:4px;border:1px solid var(--bd2);background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .15s}
.cl-cb-box.ok{background:rgba(63,185,80,.18);border-color:var(--grn);color:var(--grn)}
.cl-cb-box.no{background:rgba(248,81,73,.18);border-color:var(--red);color:var(--red)}
.cl-cb-lbl{font-size:9px;color:var(--text3);font-weight:600;font-family:var(--mono)}
.cl-temp-inp{border:1px solid var(--bd2);border-radius:5px;padding:3px 6px;font-size:13px;font-weight:700;color:var(--blu);text-align:center;outline:none;background:var(--bg4);width:75px}
.cl-temp-inp.has-val{border-color:rgba(88,166,255,.4)}
.cl-temp-inp:focus{border-color:var(--blu)}
.cl-cmt-btn{background:none;border:none;font-size:10px;font-weight:600;color:var(--blu);cursor:pointer;padding:2px 0 0;font-family:var(--font)}
.cl-cmt-box{display:none;margin-top:3px}
.cl-cmt-box.open{display:block}
.cl-cmt-box textarea{width:100%;border:1px solid var(--bd2);border-radius:6px;padding:5px 7px;font-size:12px;color:var(--blu);resize:none;outline:none;min-height:36px;background:rgba(88,166,255,.05);font-family:var(--font)}
.cl-cmt-box textarea:focus{border-color:var(--blu)}
.cl-hyg-wrap{background:var(--bg2);border-radius:9px;border:1px solid var(--bd);overflow:hidden;flex-shrink:0}
.cl-hyg-tb{background:var(--bg3);padding:7px 10px;display:flex;align-items:center;justify-content:space-between}
.cl-hyg-tb h4{color:var(--text);font-size:11.5px;font-weight:700}
.cl-hyg-scroll{overflow-x:auto;max-height:none}
.cl-hyg-table{width:100%;border-collapse:collapse;font-size:10px;min-width:580px}
.cl-hyg-table th{background:var(--bg3);font-weight:700;padding:4px 5px;text-align:center;border:1px solid var(--bd);font-size:9px;white-space:nowrap;color:var(--text3)}
.cl-hyg-table td{padding:2px 4px;border:1px solid var(--bd);vertical-align:middle;text-align:center;color:var(--text2)}
.cl-hyg-table td.nm{text-align:left;font-weight:600;min-width:130px;color:var(--text)}
.cl-hyg-cb{width:18px;height:18px;border-radius:3px;border:1px solid var(--bd2);background:var(--bg4);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;transition:all .15s;margin:0 auto}
.cl-hyg-cb.ok{background:rgba(63,185,80,.18);border-color:var(--grn);color:var(--grn)}
.cl-hyg-cb.no{background:rgba(248,81,73,.18);border-color:var(--red);color:var(--red)}
.cl-emp-inp{border:none;background:transparent;font-size:10px;font-weight:600;color:var(--text);outline:none;width:100%;min-width:100px;font-family:var(--font)}
.cl-emp-inp:focus{background:rgba(88,166,255,.08);border-radius:3px;padding:0 3px}
.cl-bt-inp{border:none;background:transparent;text-align:center;font-size:12px;font-weight:600;color:var(--blu);outline:none;width:100%;font-family:var(--mono)}
.cl-bt-inp:focus{background:rgba(88,166,255,.08);border-radius:3px}
.cl-cf-card{background:var(--bg2);border-radius:9px;border:1px solid var(--bd);overflow:hidden;margin-bottom:8px;flex-shrink:0}
.cl-cf-hdr{background:var(--bg3);padding:7px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.cl-cf-hdr h4{color:var(--text);font-size:11.5px;font-weight:700}
.cl-cf-scroll{overflow-x:auto}
.cl-cf-tbl{width:100%;border-collapse:collapse;font-size:10.5px}
.cl-cf-tbl th{background:var(--bg3);font-weight:700;padding:5px 7px;text-align:center;border:1px solid var(--bd);font-size:9px;white-space:nowrap;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}
.cl-cf-tbl th.day-col{background:#1a2340;color:#93c5fd;min-width:90px}
.cl-cf-tbl td{padding:3px 5px;border:1px solid var(--bd);vertical-align:middle}
.cl-cf-tbl td.row-label{font-weight:600;font-size:10.5px;padding:5px 10px;text-align:left;min-width:150px;color:var(--text2);background:var(--bg3)}
.cl-cf-tbl tr.cat-row td{background:linear-gradient(90deg,rgba(88,166,255,.12),transparent);color:var(--blu);font-weight:700;font-size:10px;padding:4px 10px;text-align:left;letter-spacing:.5px;text-transform:uppercase}
.cl-cf-bal{text-align:center;font-size:13px;font-weight:700;font-family:var(--mono);color:var(--grn);padding:2px 4px}
.cl-cf-bal.neg{color:var(--red)}
.cl-cf-inp{border:none;background:transparent;text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--acc2);outline:none;width:100%;min-width:34px}
.cl-cf-inp:focus{background:rgba(240,165,0,.08);border-radius:3px}
.cl-cf-inp.am{color:#60a5fa}
.cl-cf-inp.pm{color:#a78bfa}
.cl-sign-inp{border:none;background:transparent;font-size:11px;color:var(--text2);outline:none;width:100%;font-family:var(--font)}
.cl-sign-inp:focus{background:rgba(255,255,255,.05);border-radius:3px}
#cl-auth-overlay{display:none;position:absolute;inset:0;background:var(--overlay-bg);backdrop-filter:blur(16px);z-index:50;align-items:center;justify-content:center;flex-direction:column;border-radius:8px}
#cl-auth-overlay.show{display:flex}
.cl-auth-card{background:var(--modal-bg);border:1px solid var(--bd2);border-radius:16px;padding:32px 36px;width:320px;max-width:92%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.cl-role-btns{display:flex;gap:10px;margin:16px 0}
.cl-role-btn{flex:1;padding:12px 8px;border:1.5px solid var(--bd2);border-radius:10px;background:var(--bg3);color:var(--text3);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.cl-role-btn.sel{border-color:var(--acc);color:var(--acc2);background:rgba(240,165,0,.08)}
.cl-pin-inp{width:100%;border:1.5px solid var(--bd2);border-radius:8px;padding:9px 12px;background:var(--bg4);color:var(--text);font-size:16px;font-family:var(--mono);letter-spacing:8px;text-align:center;outline:none;margin:8px 0 4px;transition:border-color .2s}
.cl-pin-inp:focus{border-color:var(--acc)}
.cl-pin-err{font-size:10px;color:var(--red);min-height:14px;display:block}
#cl-wrap{display:flex;flex-direction:column;height:100%;position:relative;overflow:hidden}
#cl-print-modal{display:none;position:fixed;inset:0;background:var(--overlay-bg);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center}
#cl-print-modal.show{display:flex}
.cl-print-card{background:var(--modal-bg);backdrop-filter:blur(20px);border:1px solid var(--bd2);border-radius:14px;padding:24px;width:480px;max-width:95vw;max-height:85vh;overflow-y:auto}
#cl-edit-modal{display:none;position:fixed;inset:0;background:var(--overlay-bg);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center}
#cl-edit-modal.show{display:flex}
.cl-edit-card{background:var(--modal-bg);backdrop-filter:blur(20px);border:1px solid var(--bd2);border-radius:14px;padding:22px;width:520px;max-width:95vw;max-height:85vh;overflow-y:auto}

</style>
</head>
<body>

<div id="loading">
  <div style="font-size:36px;margin-bottom:4px">✅</div>
  <div class="spinner"></div>
  <div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:4px">Connecting…</div>
</div>

<!-- Branch Selector -->
<div id="branch-screen" class="gone">
  <div class="bs-card">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:38px;margin-bottom:6px">✅</div>
      <div style="font-size:18px;font-weight:800;color:rgba(255,255,255,.92)">Operations Checklists</div>

// Toast
function toast(msg,type){
  var w=document.getElementById('toasts'); if(!w)return;
  var el=document.createElement('div'); el.className='toast '+(type||'info');
  var ic={success:'✅',error:'❌',warning:'⚠️',w:'⚠️',info:'ℹ️'};
  el.innerHTML='<span style="font-size:16px;flex-shrink:0">'+(ic[type]||'ℹ️')+'</span><span>'+msg+'</span>';
  w.appendChild(el);
  setTimeout(function(){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(function(){el.remove();},350);},3200);
}

// ═══════════════════════════════════════
// 🏢 BRANCH SELECTOR
// ═══════════════════════════════════════
function showBranchScreen(){
  document.getElementById('loading').classList.add('gone');
  document.getElementById('branch-screen').classList.remove('gone');
  document.getElementById('app').style.display='none';
  db.ref('admin/branches').once('value',function(snap){
    var raw=snap.val()||{};
    var branches=Object.values(raw).filter(function(b){return b&&b.active!==false;});
    branches.sort(function(a,b){return (a.name||'').localeCompare(b.name||'');});
    var el=document.getElementById('bs-branch-list'); if(!el)return;
    el.innerHTML='';
    if(!branches.length){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,.3);padding:20px;font-size:12px">No branches found.</div>';return;}
    branches.forEach(function(b){
      var btn=document.createElement('button'); btn.className='bs-btn';
      btn.innerHTML='<div style="width:36px;height:36px;border-radius:9px;background:'+(b.color||'#f0a500')+';display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">'+(b.icon||'✅')+'</div>'
        +'<div style="flex:1"><div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.9)">'+(b.name||b.id)+'</div>'
        +'<div style="font-size:10px;color:rgba(255,255,255,.4);font-family:monospace">'+(b.brand||'')+(b.location?' · '+b.location:'')+'</div></div>'
        +'<div style="font-size:16px;color:rgba(255,255,255,.2)">›</div>';
      btn.onclick=function(){
        _pendingBranch=b;
        document.getElementById('pin-branch-name').textContent=b.name||b.id;
        document.getElementById('pin-branch-sub').textContent=(b.brand||'')+(b.location?' · '+b.location:'');
        document.getElementById('branch-list-step').style.display='none';
        document.getElementById('pin-screen').style.display='block';
        var pi=document.getElementById('pin-inp'); pi.value='';
        document.getElementById('pin-err').textContent='';
        setTimeout(function(){pi.focus();},60);
      };
      el.appendChild(btn);
    });
  });
}

function submitPin(){
  if(!_pendingBranch)return;
  var pin=(document.getElementById('pin-inp').value||'').trim();
  if(!pin){document.getElementById('pin-err').textContent='Enter PIN';return;}
  if(pin!==String(_pendingBranch.pin)){
    document.getElementById('pin-err').textContent='Incorrect PIN';
    document.getElementById('pin-inp').value=''; document.getElementById('pin-inp').focus(); return;
  }
  CURRENT_BRANCH=_pendingBranch; BRANCH_PATH='branches/'+_pendingBranch.id;
  try{localStorage.setItem(CL_SESSION_KEY,JSON.stringify({branchId:_pendingBranch.id,branch:_pendingBranch,expires:Date.now()+10*3600000}));}catch(e){}
  launchChecklist();
}

function launchChecklist(){
  var hlo=document.getElementById('hdr-logo');
  var hn=document.getElementById('hdr-branch-name');
  var hs=document.getElementById('hdr-branch-sub');
  if(CURRENT_BRANCH){
    if(hlo){hlo.textContent=CURRENT_BRANCH.icon||'✅';hlo.style.background='linear-gradient(135deg,'+(CURRENT_BRANCH.color||'#f0a500')+','+(CURRENT_BRANCH.color||'#f0a500')+'aa)';}
    if(hn) hn.textContent=CURRENT_BRANCH.name||'Checklists';
    if(hs) hs.textContent=(CURRENT_BRANCH.brand||'')+(CURRENT_BRANCH.location?' · '+CURRENT_BRANCH.location:'');
  }
  var brInp=document.getElementById('cl-branch');
  if(brInp&&CURRENT_BRANCH) brInp.value=CURRENT_BRANCH.name||CURRENT_BRANCH.id||'MOA';

  document.getElementById('branch-screen').classList.add('gone');
  document.getElementById('loading').classList.add('gone');
  document.getElementById('app').style.display='flex';

  var ps=document.getElementById('cl-period-start');
  if(ps&&!ps.value){
    var n=new Date(),dow=n.getDay(),sun=new Date(n); sun.setDate(n.getDate()-dow);
    ps.value=sun.getFullYear()+'-'+String(sun.getMonth()+1).padStart(2,'0')+'-'+String(sun.getDate()).padStart(2,'0');
  }
  clWeekDates=clGetWeekDates(ps?ps.value:'');
  window.monthlyRecords={};
  clEnsureST();
  clLoadBTItems();
  clBindSecTabs();
  // Card event delegation
  var cards=document.getElementById('cl-cards');
  if(cards){
    cards.addEventListener('click',function(e){
      var btn=e.target.closest('[data-clid][data-val]');
      if(btn){var d=btn.dataset;clSetV(d.clid,parseInt(d.di),d.iid,d.sh,d.val);}
    });
    cards.addEventListener('input',function(e){
      if(e.target.classList.contains('cl-shift-temp')){var d=e.target.dataset;clSetTemp(d.clid,parseInt(d.di),d.iid,d.sh,e.target);}
    });
    cards.addEventListener('change',function(e){
      if(e.target.classList.contains('cl-shift-temp')){var d=e.target.dataset;clSetTemp(d.clid,parseInt(d.di),d.iid,d.sh,e.target);}
    });
  }
  clInitFBSync();
}

// ═══════════════════════════════════════
// 🔥 INIT
// ═══════════════════════════════════════
window.onload=function(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    db.ref('.info/connected').on('value',function(snap){
      var on=!!snap.val(); var dot=document.getElementById('conn-dot');
      if(dot) dot.className='conn-dot'+(on?'':' off');
    });
  }catch(e){document.getElementById('loading').classList.add('gone');toast('Firebase error: '+e.message,'error');return;}

  document.getElementById('pin-back-btn').onclick=function(){
    document.getElementById('pin-screen').style.display='none';
    document.getElementById('branch-list-step').style.display='block';
    _pendingBranch=null;
  };
  document.getElementById('pin-submit-btn').onclick=submitPin;
  document.getElementById('pin-inp').addEventListener('keydown',function(e){
    if(e.key==='Enter') submitPin();
    document.getElementById('pin-err').textContent='';
  });

  // 1. URL param ?branch=xxx (QR scan — no PIN needed)
  var urlParams=new URLSearchParams(window.location.search);
  var urlBranch=urlParams.get('branch')||urlParams.get('b');
  if(urlBranch){
    db.ref('admin/branches/'+urlBranch).once('value',function(snap){
      var b=snap.val();
      if(b&&b.active!==false){
        CURRENT_BRANCH=b; BRANCH_PATH='branches/'+urlBranch;
        try{localStorage.setItem(CL_SESSION_KEY,JSON.stringify({branchId:urlBranch,branch:b,expires:Date.now()+10*3600000}));}catch(ex){}
        launchChecklist();
      } else {showBranchScreen();}
    },function(){showBranchScreen();});
    return;
  }

  // 2. Saved session
  var sess=null;
  try{sess=JSON.parse(localStorage.getItem(CL_SESSION_KEY)||'null');}catch(e){}
  if(sess&&sess.branchId&&sess.expires>Date.now()){
    CURRENT_BRANCH=sess.branch||null; BRANCH_PATH='branches/'+sess.branchId;
    launchChecklist(); return;
  }

  // 3. Branch selector
  showBranchScreen();
};

};

// Load bartender items from Firebase — called after branch login
function clLoadBTItems(){
  if(!db) return;
  db.ref(bPath('cl_bt_items')).once('value', function(snap){
    var v = snap.val();
    if(v && v.chiller && v.bases){
      CL_BT_ITEMS.chiller = v.chiller;
      CL_BT_ITEMS.bases   = v.bases;
    }
    // Re-ensure state with updated items
    clEnsureST();
  });
}

// Save bartender items to Firebase
function clSaveBTItems(){
  if(!db) return;
  db.ref(bPath('cl_bt_items')).set({
    chiller: CL_BT_ITEMS.chiller,
    bases:   CL_BT_ITEMS.bases
  }, function(err){
    if(!err) toast('Bartender items saved ✓','success');
    else toast('Save error','error');
  });
}

var clSec='mod', clCl={mod:0,foh:0,boh:0,forms:0}, clDay={mod:0,foh:0,boh:0}, clWeekDates=[], clST={}, clRole=null, _clSelRole=null, clFbRef=null, _clBtDay=0, _clCoolDay=0;


window.monthlyRecords = {};


function clWk(){return clNormWk();}


function clFbKey(str){
  return String(str||'').replace(/[.#$\[\]\/]/g,'_');
}


function clFmtD(d){return d.getDate()+'-'+CL_MONTHS[d.getMonth()];}


function clGetWeekDates(v){
  var arr=[],b=v?new Date(v+'T00:00:00'):new Date();
  if(v){var dow=b.getDay();b.setDate(b.getDate()-dow);}
  for(var i=0;i<7;i++){var d=new Date(b);d.setDate(b.getDate()+i);arr.push(d);}
  return arr;
}


function clXe(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}


function clIsAdmin(){return clRole==='admin';}


function clEnsureST(){
  var w=clWk();if(!clST[w])clST[w]={};
  ['mod','foh','boh'].forEach(function(sec){
    (CL_DATA[sec]||[]).forEach(function(cl){
      if(cl.checkType==='hygiene'||cl.checkType==='bartender')return;
      if(!clST[w][cl.id])clST[w][cl.id]={};
      var allItems=(cl.groups||[]).reduce(function(a,g){return a.concat(g.items||[]);},[]);
      for(var di=0;di<7;di++){
        if(!clST[w][cl.id][di])clST[w][cl.id][di]={};
        allItems.forEach(function(item){
          if(!clST[w][cl.id][di][item.id])clST[w][cl.id][di][item.id]={flagged:false};
          CL_SHIFTS.forEach(function(sh){if(!clST[w][cl.id][di][item.id][sh])clST[w][cl.id][di][item.id][sh]={v:null,temp:'',comment:''};});
        });
      }
    });
  });
  ['foh_hygiene','hoh_hygiene'].forEach(function(hid){
    if(!clST[w][hid])clST[w][hid]={employees:[],checks:{}};
    // Guard: checks may be undefined if Firebase returned partial data
    if(!clST[w][hid].checks)clST[w][hid].checks={};
    for(var di=0;di<7;di++){if(!clST[w][hid].checks[di])clST[w][hid].checks[di]={};}
  });
  if(!clST[w]['foh_bartender'])clST[w]['foh_bartender']={};
  CL_BT_ITEMS.chiller.concat(CL_BT_ITEMS.bases).forEach(function(item){
    var k=clFbKey(item);
    if(!clST[w]['foh_bartender'][k])clST[w]['foh_bartender'][k]={sl:'',uom:'',prep:{}};
    // Guard: clWeekDates may be empty before login — use 7-slot loop as fallback
    if(clWeekDates.length){
      clWeekDates.forEach(function(_,di){if(!clST[w]['foh_bartender'][k].prep[di])clST[w]['foh_bartender'][k].prep[di]={oh:'',par:'',prep:''};});
    } else {
      for(var di=0;di<7;di++){if(!clST[w]['foh_bartender'][k].prep[di])clST[w]['foh_bartender'][k].prep[di]={oh:'',par:'',prep:''};}
    }
  });
  // Forms
  ['form_chiller','form_freezer','form_cooling','form_pizzadough','form_stockroom'].forEach(function(fid){
    if(!clST[w][fid])clST[w][fid]={};
  });
}


function clS(clId,di,itemId,sh){
  clEnsureST();
  var wk=clWk();
  // Ensure full path exists so we return a real reference (not a copy)
  if(!clST[wk]) clST[wk]={};
  if(!clST[wk][clId]) clST[wk][clId]={};
  if(!clST[wk][clId][di]) clST[wk][clId][di]={};
  if(!clST[wk][clId][di][itemId]) clST[wk][clId][di][itemId]={flagged:false};
  if(!clST[wk][clId][di][itemId][sh]) clST[wk][clId][di][itemId][sh]={v:null,temp:'',comment:''};
  return clST[wk][clId][di][itemId][sh];
}


function clSF(clId,di,itemId){clEnsureST();try{return clST[clWk()][clId][di][itemId]||{flagged:false};}catch(e){return {flagged:false};} }


function clNormWk(){
  var el=document.getElementById('cl-period-start');
  if(el&&el.value&&el.value.match(/^\d{4}-\d{2}-\d{2}$/))return el.value;
  // Fallback: compute Sunday of current week
  var now=new Date();
  var dow=now.getDay();
  var sun=new Date(now);sun.setDate(now.getDate()-dow);
  return sun.getFullYear()+'-'+String(sun.getMonth()+1).padStart(2,'0')+'-'+String(sun.getDate()).padStart(2,'0');
}


function clBranch(){
  return ((document.getElementById('cl-branch')||{}).value||'MOA').toUpperCase().replace(/[.#$\/\[\]]/g,'_');
}


function clWeekRef(){
  if(!db)return null;
  return db.ref(bPath('cl_weeks')+'/'+clNormWk());
}


function clSaveNow(){
  try{
    var wk=clNormWk();
    var meta={
      branch:(document.getElementById('cl-branch')||{}).value||'MOA',
      modName:(document.getElementById('cl-mod-name')||{}).value||'',
      weekStart:wk
    };
    var payload={state:clST[wk]||{},meta:meta,updatedAt:Date.now()};
    console.log('[CL] SAVE → cl_weeks/'+wk, 'keys:', Object.keys(payload.state));
    // Deep sanitize all keys before writing to Firebase
    function _sanitizeKeys(obj){
      if(typeof obj!=='object'||obj===null||Array.isArray(obj))return obj;
      var out={};
      Object.keys(obj).forEach(function(k){
        var sk=clFbKey(k);
        out[sk]=_sanitizeKeys(obj[k]);
      });
      return out;
    }
    payload.state=_sanitizeKeys(payload.state);
    if(db){
      db.ref(bPath('cl_weeks')+'/'+wk).set(payload,function(err){
        if(err){console.error('[CL] Save ERROR:',err);}
        else{
          console.log('[CL] Save SUCCESS for week:',wk);
          // Update monthly cache
          window.monthlyRecords[wk]={state:payload.state,meta:meta};
        }
      });
    }
    var ind=document.getElementById('cl-save-ind');
    if(ind){ind.textContent='✓ Saved';ind.style.color='var(--grn)';setTimeout(function(){if(ind){ind.textContent='⚡ Live';ind.style.color='var(--text3)';}},2000);}
  }catch(e){console.error('[CL] clSaveNow error:',e);}
}


function clSave(){
  clearTimeout(clSaveTmr);
  clSaveTmr=setTimeout(clSaveNow,700);
}


function clInitFBSync(){
  if(!db){
    var el=document.getElementById('cl-fb-status');
    if(el){el.innerHTML='⏳ Connecting...';el.style.color='var(--gold)';}
    setTimeout(clInitFBSync,800);
    return;
  }
  var wk=clNormWk();
  var path=bPath('cl_weeks')+'/'+wk;
  console.log('[CL] FETCH ← cl_weeks/'+wk);
  var el=document.getElementById('cl-fb-status');
  if(el){el.innerHTML='⏳ Loading...';el.style.color='var(--gold)';}

  // Use .on() for real-time sync — same pattern as the rest of the app
  if(clFbRef)clFbRef.off(); // detach previous listener
  clFbRef=db.ref(path);
  clFbRef.on('value',function(snap){
    var d=snap.val();
    console.log('[CL] Firebase sync for week '+wk+':', d?'HAS DATA (keys:'+Object.keys(d&&d.state||{}).join(',')+')':'EMPTY/NULL');
    if(d&&d.state&&Object.keys(d.state).length>0){
      // Firebase is authoritative — restore this week's state fully
      if(!clST[wk])clST[wk]={};
      Object.keys(d.state).forEach(function(k){
        clST[wk][k]=d.state[k];
      });
      window.monthlyRecords[wk]={state:d.state,meta:d.meta||{}};
    } else {
      console.warn('[CL] No data for week '+wk+' at path cl_weeks/'+wk);
    }
    clEnsureST();
    // Only re-render if checklist page is currently visible
    if(clRole&&document.getElementById('cl-wrap')&&S.p==='checklists'){
      clRenderSec(clSec);
    }
    if(el){el.innerHTML='⚡ Live';el.style.color='var(--grn)';}
  },function(err){
    console.error('[CL] Firebase error:',err,'path:',path);
    if(el){el.innerHTML='⚠ Offline';el.style.color='var(--red)';}
    clEnsureST();
    if(clRole&&document.getElementById('cl-wrap')&&S.p==='checklists'){
      clRenderSec(clSec);
    }
  });
}


function clLoadMonthlyData(monthYear, callback){
  // monthYear = 'YYYY-MM'
  if(!db){if(callback)callback({});return;}
  var path=bPath('cl_weeks');
  console.log('[CL] MONTHLY FETCH ← '+path+' for month:'+monthYear);
  db.ref(path).once('value',function(snap){
    var all=snap.val()||{};
    var monthly={};
    Object.keys(all).forEach(function(wk){
      if(wk.indexOf(monthYear)===0||clWeekInMonth(wk,monthYear)){
        monthly[wk]=all[wk];
        window.monthlyRecords[wk]=all[wk];
      }
    });
    console.log('[CL] Monthly fetch complete. Weeks found:',Object.keys(monthly));
    if(callback)callback(monthly);
  },function(err){
    console.error('[CL] Monthly fetch error:',err);
    if(callback)callback({});
  });
}


function clWeekInMonth(wk,monthYear){
  if(!wk||!wk.match(/^\d{4}-\d{2}-\d{2}$/))return false;
  var sun=new Date(wk+'T00:00:00');
  var sat=new Date(sun.getTime()+6*86400000);
  var mStart=new Date(monthYear+'-01T00:00:00');
  var mEnd=new Date(mStart.getFullYear(),mStart.getMonth()+1,0,23,59,59);
  return sun<=mEnd&&sat>=mStart;
}

function clRenderSec(sec){
  try{
    var cls=CL_DATA[sec];if(!cls||!cls.length)return;
    var ci=clCl[sec]||0,cl=cls[ci];if(!cl)return;
    var di=clDay[sec]||0;
    // Sub tabs
    var tw=document.getElementById('cl-sub-tabs');if(!tw)return;
    tw.innerHTML='';
    cls.forEach(function(c,i){
      var b=document.createElement('button');b.className='cl-sub-tab'+(i===ci?' active':'');
      b.textContent=c.name;
      b.onclick=(function(idx){return function(){clCl[sec]=idx;clRenderSec(sec);};})(i);
      tw.appendChild(b);
    });
    var titleEl=document.getElementById('cl-title'),subEl=document.getElementById('cl-sub');
    if(titleEl)titleEl.textContent=cl.name;if(subEl)subEl.textContent=cl.sub||'';
    if(cl.checkType==='hygiene'){
      document.getElementById('cl-prog').style.width='0%';document.getElementById('cl-prog-lbl').textContent='';
      document.getElementById('cl-day-tabs').innerHTML='';clRenderHygiene(cl);return;
    }
    if(cl.checkType==='bartender'){
      document.getElementById('cl-prog').style.width='0%';document.getElementById('cl-prog-lbl').textContent='';
      document.getElementById('cl-day-tabs').innerHTML='';clRenderBartender(cl);return;
    }
    // Day tabs — guard: clWeekDates may be empty if period-start not yet initialized
    if(!clWeekDates.length){
      var _ps=document.getElementById('cl-period-start');
      if(_ps&&_ps.value){clWeekDates=clGetWeekDates(_ps.value);}
      else{var _n=new Date(),_s=new Date(_n);_s.setDate(_n.getDate()-_n.getDay());clWeekDates=clGetWeekDates(_s.getFullYear()+'-'+String(_s.getMonth()+1).padStart(2,'0')+'-'+String(_s.getDate()).padStart(2,'0'));}
    }
    var dw=document.getElementById('cl-day-tabs');dw.innerHTML='';
    clWeekDates.forEach(function(d,dIdx){
      var b=document.createElement('button');b.className='cl-day-tab'+(dIdx===di?' active':'');
      var st=clDayStatus(cl,dIdx);b.classList.toggle('done',st==='done');b.classList.toggle('partial',st==='partial');
      b.innerHTML=CL_DAYS[d.getDay()]+' '+clFmtD(d);
      b.onclick=(function(idx){return function(){clDay[sec]=idx;clRenderSec(sec);};})(dIdx);
      dw.appendChild(b);
    });
    clRenderCards(sec,cl,di);
    // Progress
    var tot=0,done=0;
    (cl.groups||[]).forEach(function(g){(g.items||[]).forEach(function(item){CL_SHIFTS.forEach(function(sh){tot++;var s=clS(cl.id,di,item.id,sh);if(s&&s.v)done++;});});});
    var pct=tot?Math.round(done/tot*100):0;
    var pb=document.getElementById('cl-prog'),pl=document.getElementById('cl-prog-lbl');
    if(pb)pb.style.width=pct+'%';if(pl)pl.textContent=done+'/'+tot+' items  '+pct+'%';
  }catch(e){console.error('clRenderSec:',e);}
}


function clDayStatus(cl,di){
  if(!clWeekDates.length)return'empty';
  clEnsureST();var tot=0,fil=0;if(!cl.groups)return'empty';
  (cl.groups||[]).forEach(function(g){(g.items||[]).forEach(function(item){CL_SHIFTS.forEach(function(sh){tot++;var s=clS(cl.id,di,item.id,sh);if(s.v!==null)fil++;});});});
  return fil===0?'empty':fil===tot?'done':'partial';
}


function clRenderCards(sec,cl,di){
  var wrap=document.getElementById('cl-cards');if(!wrap)return;wrap.innerHTML='';clEnsureST();
  (cl.groups||[]).forEach(function(grp){
    var d=document.createElement('div');d.className='cl-grp-div';

    if(clIsAdmin()){
      var checkAllBtn=document.createElement('button');
      checkAllBtn.textContent='✅ Complete All';

      checkAllBtn.onclick=(function(grpRef,clRef,diRef,secRef){
        return function(){
          clEnsureST();
          (grpRef.items||[]).forEach(function(item){
            CL_SHIFTS.forEach(function(sh){
              var s=clS(clRef.id,diRef,item.id,sh);
              s.v=clRef.checkType==='temp'?'yes':'ok';
            });
          });
          clSaveNow();
          var sec2=clFindSec(clRef.id);
          clRenderCards(sec2,CL_DATA[sec2][clCl[sec2]],diRef);
          clRenderSec(sec2);
        };
      })(grp,cl,di,sec);

    }
    wrap.appendChild(d);
    (grp.items||[]).forEach(function(item){
      var amS=clS(cl.id,di,item.id,'AM'),pmS=clS(cl.id,di,item.id,'PM');
      var allOk=(amS.v==='ok'||amS.v==='yes')&&(pmS.v==='ok'||pmS.v==='yes');
      var anyNo=amS.v==='no'||pmS.v==='no';
      var card=document.createElement('div');card.className='cl-item-card'+(allOk?' all-ok':anyNo?' has-no':'');
      var flagged=clSF(cl.id,di,item.id).flagged;
      card.innerHTML='<div class="cl-card-inner">'
        +'<div class="cl-card-top"><div class="cl-card-lbl">'
        +'<span class="cl-badge'+(item.yellow?' key':'')+'">'+( item.yellow?'⭐ KEY':'CHECK')+'</span>'
        +'<div class="cl-item-q">'+clXe(item.label)+'</div></div>'
        +'<button class="cl-flag-btn'+(flagged?' on':'')+'" data-clid="'+clXe(cl.id)+'" data-di="'+di+'" data-iid="'+clXe(item.id)+'">🚩</button>'
        +'</div>'
        +'<div class="cl-shifts-row">'+CL_SHIFTS.map(function(sh){return clBuildShift(cl,di,item,sh);}).join('')+'</div>'
        +'<button class="cl-cmt-btn" onclick="clToggleCmt(this)">+ Add Comment</button>'
        +'<div class="cl-cmt-box'+(amS.comment?' open':'')+'"><textarea placeholder="Write comment..." data-clid="'+clXe(cl.id)+'" data-di="'+di+'" data-iid="'+clXe(item.id)+'">'+clXe(amS.comment||'')+'</textarea></div>'
        +'</div>';
      wrap.appendChild(card);
      // Wire flag btn via DOM
      var flagBtn=card.querySelector('.cl-flag-btn');
      if(flagBtn)(function(btn,cid,d,iid){btn.onclick=function(){clToggleFlag(cid,d,iid,btn);};})(flagBtn,cl.id,di,item.id);
      // Wire comment textarea
      var ta=card.querySelector('textarea');
      if(ta)(function(t,cid,d,iid){t.oninput=function(){clSetComment(cid,d,iid,t.value);};})(ta,cl.id,di,item.id);

      // EXPLICIT .value set on temp inputs — guarantees display even if innerHTML timing issues
      var w2=clWk();
      card.querySelectorAll('.cl-shift-temp').forEach(function(inp){
        var d2=inp.dataset;
        var saved=(clST[w2]&&clST[w2][d2.clid]&&clST[w2][d2.clid][parseInt(d2.di)]&&clST[w2][d2.clid][parseInt(d2.di)][d2.iid]&&clST[w2][d2.clid][parseInt(d2.di)][d2.iid][d2.sh])||{};
        var val=saved.temp||'';
        inp.value=val;
        if(val){inp.classList.add('has-val');}else{inp.classList.remove('has-val');}
      });
    });
  });
}

  CL_BT_ITEMS[listKey].push('New Item');

function clBTDelItem(listKey,idx){
  CL_BT_ITEMS[listKey].splice(idx,1);

function clSaveBTEdits(){
  // Flush any typed-but-not-saved values from inputs
  var body=document.getElementById('cl-edit-body');
  if(body) body.querySelectorAll('input[data-btlist]').forEach(function(inp){
    var list=inp.dataset.btlist,idx=parseInt(inp.dataset.bti);
    if(CL_BT_ITEMS[list]) CL_BT_ITEMS[list][idx]=inp.value;
  });
  clSaveBTItems();
  clEnsureST();
  document.getElementById('cl-edit-modal').classList.remove('show');
  clRenderSec('foh');
}


function clEditItemLabel(sec,ci,gi,ii,val){CL_DATA[sec][ci].groups[gi].items[ii].label=val;}


function clEditItemKey(sec,ci,gi,ii,val){CL_DATA[sec][ci].groups[gi].items[ii].yellow=val;}


function clEditItemTemp(sec,ci,gi,ii,val){CL_DATA[sec][ci].groups[gi].items[ii].hasTemp=val;}


function clDelItem(sec,ci,gi,ii){
  CL_DATA[sec][ci].groups[gi].items.splice(ii,1);
  clOpenEdit();clRenderSec(sec);
}


function clAddItem(sec,ci,gi){
  var newId='item_'+Date.now();
  CL_DATA[sec][ci].groups[gi].items.push({id:newId,label:'New Item',yellow:false,hasTemp:false});
  clOpenEdit();clRenderSec(sec);
}


function clBindPage(){
  if(_clPageBound)return;_clPageBound=true;
  clBindSecTabs();
  // Set period-start to current Sunday (start of this week) before anything else
  var ps=document.getElementById('cl-period-start');
  if(ps&&!ps.value){
    var _now=new Date();
    var _dow=_now.getDay();
    var _sun=new Date(_now);_sun.setDate(_now.getDate()-_dow);
    ps.value=_sun.getFullYear()+'-'+String(_sun.getMonth()+1).padStart(2,'0')+'-'+String(_sun.getDate()).padStart(2,'0');
  }
  clWeekDates=clGetWeekDates(document.getElementById('cl-period-start').value);
  // State loaded exclusively from Firebase — no localStorage for checklist
  // If user is already logged in, skip the auth screen entirely
  if(clRole){
    var overlay=document.getElementById('cl-auth-overlay');
    if(overlay)overlay.classList.remove('show');
    var pb=document.getElementById('cl-print-btn');if(pb)pb.style.display=clIsAdmin()?'':'none';
    var eb=document.getElementById('cl-edit-btn');if(eb)eb.style.display=clIsAdmin()?'':'none';
    var rb=document.getElementById('cl-role-badge');if(rb)rb.textContent=clRole==='admin'?'🔐 Admin':'👨‍🍳 Staff';
    clEnsureST();
    if(clSec==='forms')clRenderForms();else clRenderSec(clSec);
    return;
  }
  // Event delegation for all cl-cards interactions
  var cards=document.getElementById('cl-cards');
  if(cards){
    cards.addEventListener('click',function(e){
      // YN buttons and CB items
      var btn=e.target.closest('[data-clid][data-val]');
      if(btn){var d=btn.dataset;clSetV(d.clid,parseInt(d.di),d.iid,d.sh,d.val);return;}
    });
    cards.addEventListener('input',function(e){
      // Temp inputs
      if(e.target.classList.contains('cl-shift-temp')){
        var d=e.target.dataset;clSetTemp(d.clid,parseInt(d.di),d.iid,d.sh,e.target);
      }
    });
    cards.addEventListener('change',function(e){
      // Also save on change (blur after edit) for temp inputs
      if(e.target.classList.contains('cl-shift-temp')){
        var d=e.target.dataset;clSetTemp(d.clid,parseInt(d.di),d.iid,d.sh,e.target);
      }
    });
  }
}


function clPrintMonthly(){
  // Determine current month from period-start
  var ps=(document.getElementById('cl-period-start')||{}).value||'';
  if(!ps)ps=new Date().toISOString().slice(0,10);
  var monthYear=ps.slice(0,7); // YYYY-MM
  var branch=(document.getElementById('cl-branch')||{}).value||'MOA';
  var modName=(document.getElementById('cl-mod-name')||{}).value||'—';

  // Show loading toast
  toast('Loading monthly data...','warning');

  clLoadMonthlyData(monthYear,function(monthly){
    var wks=Object.keys(monthly).sort();
    if(!wks.length){
      // Use current week's data from clST
      var wk=clNormWk();
      monthly[wk]={state:clST[wk]||{},meta:{weekStart:wk}};
      wks=[wk];
    }

    var CSS='<style>'
      +'@page{size:A4 landscape;margin:8mm}'
      +'*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}'
      +'body{background:#fff;color:#111;font-size:8px}'
      +'table{width:100%;border-collapse:collapse;margin-bottom:12px}'
      +'th,td{border:1px solid #ccc;padding:2px 4px;vertical-align:middle}'
      +'th{background:#1e3a5f;color:#fff;font-size:8px;text-align:center}'
      +'.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:6px;border-bottom:3px solid #1e3a5f}'
      +'.hdr-brand{font-size:18px;font-weight:900;color:#1e3a5f}'
      +'.hdr-info{text-align:right;font-size:9px;color:#555;line-height:1.6}'
      +'.wk-hdr{background:#0f2340;color:#fff;font-weight:700;font-size:9px;padding:4px 8px;margin:8px 0 4px;border-radius:3px}'
      +'.cat-row td{background:#1e3a5f;color:#fff;font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.5px}'
      +'.yes{color:#16a34a;font-weight:900;font-size:11px;text-align:center}'
      +'.no{color:#dc2626;font-weight:900;font-size:11px;text-align:center}'
      +'.temp{color:#1e40af;font-size:9px;font-weight:700;text-align:center}'
      +'.foot{margin-top:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}'
      +'.foot-cell{border-top:1px solid #333;padding-top:4px;text-align:center;font-size:8px;color:#555}'
      +'@media print{.no-print{display:none}}'
      +'</style>';

    var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Monthly Checklist — '+monthYear+'</title>'+CSS+'</head><body>';

    // Header
    html+='<div class="hdr">'
      +'<div><div class="hdr-brand">ALFA.CO</div><div style="font-size:9px;color:#666">'+branch+' Operations Checklists</div></div>'
      +'<div style="text-align:center"><div style="font-size:14px;font-weight:800;color:#1e3a5f">Monthly Checklist Report</div>'
      +'<div style="font-size:10px;color:#555">'+monthYear+' — All Sections</div></div>'
      +'<div class="hdr-info"><div>Printed: '+new Date().toLocaleDateString('en-GB')+'</div><div>MOD: '+modName+'</div><div>Branch: '+branch+'</div></div>'
      +'</div>';

    // For each section (MOD, FOH, BOH)
    ['mod','foh','boh'].forEach(function(sec){
      var secLabel={mod:'🔱 MOD',foh:'🍽 FOH',boh:'👨‍🍳 BOH'}[sec];
      var cls=CL_DATA[sec]||[];
      cls.forEach(function(cl){
        if(cl.checkType==='hygiene'||cl.checkType==='bartender')return; // skip special types
        if(!cl.groups||!cl.groups.length)return;

        // Collect all items
        var allItems=[];
        cl.groups.forEach(function(grp){allItems=allItems.concat((grp.items||[]).map(function(it){return{grp:grp.name,item:it};}));});
        if(!allItems.length)return;

        // Build day columns from all weeks
        var dayCols=[];
        wks.forEach(function(wk){
          var wkState=monthly[wk]&&monthly[wk].state;
          // Get 7 days of this week
          var sun=new Date(wk+'T00:00:00');
          for(var dd=0;dd<7;dd++){
            var d2=new Date(sun.getTime()+dd*86400000);
            var ds=d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0')+'-'+String(d2.getDate()).padStart(2,'0');
            // Only include days in the selected month
            if(ds.slice(0,7)===monthYear){
              dayCols.push({date:d2,ds:ds,di:dd,wk:wk,wkState:wkState});
            }
          }
        });
        dayCols.sort(function(a,b){return a.ds.localeCompare(b.ds);});
        if(!dayCols.length)return;

        html+='<div class="wk-hdr">'+secLabel+' — '+cl.name+'</div>';
        html+='<table><thead><tr>'
          +'<th style="text-align:left;min-width:160px;font-size:8px">Item</th>'
          +'<th style="font-size:8px">Shift</th>'
          +dayCols.map(function(dc){
            var DAYS2=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            return '<th style="font-size:7px;min-width:30px">'+DAYS2[dc.date.getDay()]+'<br>'+String(dc.date.getDate()).padStart(2,'0')+'</th>';
          }).join('')
          +'</tr></thead><tbody>';

        var lastGrp='';
        allItems.forEach(function(ai){
          if(ai.grp!==lastGrp){
            html+='<tr class="cat-row"><td colspan="'+(2+dayCols.length)+'">'+ai.grp+'</td></tr>';
            lastGrp=ai.grp;
          }
          CL_SHIFTS.forEach(function(sh,si){
            html+='<tr style="background:'+(si===0?'#fff':'#f8fafc')+'">';
            if(si===0){
              html+='<td rowspan="'+CL_SHIFTS.length+'" style="font-weight:'+(ai.item.yellow?'700':'500')+';font-size:8px;text-align:left;padding:2px 6px;border-right:2px solid #e2e8f0">'
                +(ai.item.yellow?'★ ':'')+ai.item.label+'</td>';
            }
            html+='<td style="font-size:8px;color:#888;text-align:center;font-weight:600">'+sh+'</td>';
            dayCols.forEach(function(dc){
              var shiftData=null;
              if(dc.wkState&&dc.wkState[cl.id]&&dc.wkState[cl.id][dc.di]&&dc.wkState[cl.id][dc.di][ai.item.id]){
                shiftData=dc.wkState[cl.id][dc.di][ai.item.id][sh];
              }
              var v=shiftData&&shiftData.v;
              var tmp=shiftData&&shiftData.temp;
              var cell='';
              if(v==='yes'||v==='ok'){cell='<div class="yes">✓</div>'+(tmp?'<div class="temp">'+tmp+'°</div>':'');}
              else if(v==='no'){cell='<div class="no">✗</div>';}
              else{cell='<div style="color:#ccc;text-align:center">–</div>';}
              html+='<td>'+cell+'</td>';
            });
            html+='</tr>';
          });
        });
        html+='</tbody></table>';
      });
    });

    html+='<div class="foot">'
      +'<div class="foot-cell">Checked by</div>'
      +'<div class="foot-cell">Verified by MOD</div>'
      +'<div class="foot-cell">Date &amp; Signature</div>'
      +'</div>'
      +'<div class="no-print" style="text-align:center;margin-top:16px">'
      +'<button onclick="window.print()" style="background:#1e3a5f;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:13px;font-weight:700;cursor:pointer;margin-right:8px">🖨 Print / Save PDF</button>'
      +'<button onclick="window.close()" style="background:#f1f5f9;color:#333;border:1px solid #ddd;border-radius:8px;padding:10px 18px;font-size:13px;cursor:pointer">Close</button>'
      +'</div>'
      +'</body></html>';

    var w=window.open('','_blank','width=1200,height=800');
    if(w){w.document.write(html);w.document.close();}else{toast('Allow pop-ups to print','w');}
  });
}


function clLoadBTItems(){
  if(!db) return;
  db.ref(bPath('cl_bt_items')).once('value', function(snap){
    var v = snap.val();
    if(v && v.chiller && v.bases){
      CL_BT_ITEMS.chiller = v.chiller;
      CL_BT_ITEMS.bases   = v.bases;
    }
    // Re-ensure state with updated items
    clEnsureST();
  });
}


function clSaveBTItems(){
  if(!db) return;
  db.ref(bPath('cl_bt_items')).set({
    chiller: CL_BT_ITEMS.chiller,
    bases:   CL_BT_ITEMS.bases
  }, function(err){
    if(!err) toast('Bartender items saved ✓','success');
    else toast('Save error','error');
  });
}
