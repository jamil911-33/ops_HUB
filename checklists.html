<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operations Checklists</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a56c4;--blue-light:#eff6ff;
  --green:#16a34a;--green-light:#f0fdf4;
  --red:#dc2626;--red-light:#fef2f2;
  --amber:#d97706;
  --border:#e2e8f0;--text:#0f172a;--muted:#64748b;--bg:#f1f5f9;
  --font:'DM Sans',sans-serif;--hand:'Caveat',cursive;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.app-header{background:#1a2340;padding:0 14px;position:sticky;top:0;z-index:300;
  display:flex;align-items:center;justify-content:space-between;min-height:58px;
  box-shadow:0 2px 16px rgba(0,0,0,.35);gap:8px}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr-left img,.hdr-right img.alfa-logo{height:34px;object-fit:contain}
.sep{color:rgba(255,255,255,.2);font-size:18px}
.hdr-right{display:flex;gap:7px;align-items:center}
.save-ind{background:rgba(255,255,255,.1);color:#94a3b8;font-size:11px;font-weight:500;
  padding:4px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.12);transition:all .3s}
.save-ind.ok{color:#4ade80}
.btn{padding:7px 14px;border:none;border-radius:8px;font-family:var(--font);font-size:12px;
  font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(26,86,196,.4)}
.btn-blue:hover{background:#1448a0;transform:translateY(-1px)}
.btn-red{background:#dc2626;color:#fff}
.btn-red:hover{background:#b91c1c}
.btn-green{background:#16a34a;color:#fff}
.btn-cancel{background:var(--bg);color:var(--muted);border:1px solid var(--border)}

/* SECTION TABS */
.sec-tabs{background:#111d35;display:flex;padding:0 14px;border-top:1px solid rgba(255,255,255,.07)}
.sec-tab{padding:9px 16px;font-family:var(--font);font-size:12px;font-weight:700;
  color:#64748b;background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;
  transition:all .2s;white-space:nowrap}
.sec-tab:hover{color:#cbd5e1}
.sec-tab.active{color:#fff;border-bottom-color:#60a5fa}

/* META BAR */
.meta-bar{background:#fff;border-bottom:1px solid var(--border);padding:7px 14px;
  display:flex;gap:9px;align-items:center;flex-wrap:wrap;font-size:12px}
.meta-bar label{color:var(--muted);font-weight:600;white-space:nowrap}
.meta-bar input,.meta-bar select{border:1px solid var(--border);border-radius:7px;
  padding:4px 8px;font-family:var(--font);font-size:12px;background:var(--bg);outline:none}
.meta-bar input:focus,.meta-bar select:focus{border-color:var(--blue)}

/* CL TABS */
.cl-tabs{background:#fff;border-bottom:2px solid var(--border);padding:0 14px;
  display:flex;overflow-x:auto;scrollbar-width:none;gap:0}
.cl-tabs::-webkit-scrollbar{display:none}
.cl-tab{flex-shrink:0;padding:9px 14px;font-family:var(--font);font-size:12px;font-weight:700;
  color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;
  cursor:pointer;transition:all .2s;white-space:nowrap;margin-bottom:-2px}
.cl-tab:hover{color:var(--blue)}
.cl-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* CL HEADER */
.cl-hdr{padding:12px 14px 3px}
.cl-hdr h2{font-size:17px;font-weight:700;color:var(--blue)}
.cl-hdr .sub{font-size:11px;color:var(--muted);margin-top:2px}
.prog-wrap{margin:6px 14px 0;background:var(--border);border-radius:99px;height:4px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue),#60a5fa);border-radius:99px;transition:width .4s}
.prog-lbl{font-size:10px;color:var(--muted);margin:2px 14px 0;text-align:right}

/* DAY TABS */
.day-tabs{display:flex;overflow-x:auto;gap:6px;padding:8px 14px 0;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:5px 10px;border-radius:99px;border:1.5px solid var(--border);
  background:#fff;font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;
  color:var(--muted);transition:all .15s;white-space:nowrap}
.day-tab:hover{border-color:var(--blue);color:var(--blue)}
.day-tab.active{background:var(--blue);border-color:var(--blue);color:#fff}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-left:4px;vertical-align:middle;background:#cbd5e1}
.day-tab.active .dot{background:rgba(255,255,255,.5)}
.day-tab.done .dot{background:#4ade80}
.day-tab.partial .dot{background:#facc15}

/* CARDS WRAP */
.cards-wrap{padding:8px 14px 70px;display:flex;flex-direction:column;gap:8px}

/* GROUP DIVIDER */
.grp-div{background:linear-gradient(90deg,#1e3a5f,#1a56c4);border-radius:8px;
  padding:7px 12px;color:#fff;font-size:11px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;animation:fadeUp .15s ease both}

/* ITEM CARD */
.item-card{background:#fff;border-radius:11px;border:1.5px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.04);animation:fadeUp .18s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.item-card.all-ok{border-color:#86efac;background:#f0fdf4}
.item-card.has-no{border-color:#fca5a5;background:#fef2f2}
.card-inner{padding:10px 12px 8px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.card-lbl{flex:1}
.badge{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  color:var(--muted);background:var(--bg);padding:1px 6px;border-radius:3px;margin-bottom:3px}
.badge.key{background:#fef9c3;color:#92400e}
.item-q{font-size:13px;font-weight:600;line-height:1.4;color:var(--text)}
.flag-btn{background:none;border:1.5px solid var(--border);border-radius:6px;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;
  flex-shrink:0;transition:all .15s;margin-top:1px}
.flag-btn:hover,.flag-btn.on{background:#fef2f2;border-color:#f87171}

/* SHIFTS ROW */
.shifts-row{display:flex;gap:7px;margin-top:7px;flex-wrap:wrap}
.shift-blk{flex:1;min-width:130px;background:var(--bg);border-radius:8px;padding:6px 8px 5px}
.sh-title{font-size:9px;font-weight:800;color:var(--muted);letter-spacing:.5px;margin-bottom:5px}
.ctrl-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.ctrl-lbl{font-size:10px;font-weight:700;color:var(--muted);min-width:62px;flex-shrink:0}

/* YES/NO buttons */
.yn-grp{display:flex;gap:4px}
.yn-btn{padding:5px 10px;border-radius:7px;border:1.5px solid var(--border);background:#fff;
  font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--muted)}
.yn-btn:hover{border-color:#94a3b8;color:var(--text)}
.yn-btn.yes{background:var(--green-light);border-color:#86efac;color:var(--green)}
.yn-btn.no{background:var(--red-light);border-color:#fca5a5;color:var(--red)}

/* CHECKMARK only (no YES/NO label) */
.cb-grp{display:flex;gap:6px}
.cb-item{display:flex;align-items:center;gap:3px;cursor:pointer;user-select:none}
.cb-box{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border);background:#fff;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;transition:all .15s}
.cb-box:hover{border-color:#94a3b8}
.cb-box.ok{background:var(--green-light);border-color:#86efac;color:var(--green)}
.cb-box.no{background:var(--red-light);border-color:#fca5a5;color:var(--red)}
.cb-lbl{font-size:10px;color:var(--muted);font-weight:600}

/* TEMP input */
.temp-inp{border:1.5px solid var(--border);border-radius:6px;padding:4px 5px;
  font-family:var(--hand);font-size:16px;font-weight:700;color:var(--blue);
  text-align:center;outline:none;background:#fff;width:56px}
.temp-inp:focus{border-color:var(--blue);background:var(--blue-light)}
.temp-inp.has-val{border-color:#93c5fd}

/* COMMENT */
.cmt-btn{background:none;border:none;font-family:var(--font);font-size:11px;font-weight:600;
  color:var(--blue);cursor:pointer;padding:4px 0 1px}
.cmt-box{display:none;margin-top:4px}
.cmt-box.open{display:block}
.cmt-box textarea{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:6px 8px;
  font-family:var(--hand);font-size:15px;color:var(--blue);resize:none;outline:none;
  min-height:40px;background:var(--blue-light)}
.cmt-box textarea::placeholder{color:#93c5fd}

/* HYGIENE EMPLOYEE TABLE */
.hygiene-wrap{background:#fff;border-radius:11px;border:1.5px solid var(--border);overflow:hidden}
.hygiene-toolbar{background:#1a2340;padding:8px 12px;display:flex;align-items:center;
  justify-content:space-between;gap:8px}
.hygiene-toolbar h4{color:#fff;font-size:12px;font-weight:700}
.hygiene-scroll{overflow-x:auto}
.hygiene-table{width:100%;border-collapse:collapse;font-size:11px;min-width:600px}
.hygiene-table th{background:#f1f5f9;font-weight:700;padding:5px 6px;text-align:center;
  border:1px solid var(--border);font-size:10px;white-space:nowrap}
.hygiene-table td{padding:3px 5px;border:1px solid var(--border);vertical-align:middle;text-align:center}
.hygiene-table td.name-cell{text-align:left;font-weight:600;min-width:140px}
.hygiene-table td.num-cell{color:var(--muted);font-size:10px;width:30px}
.hygiene-table .section-row td{background:#e0e7ff;font-weight:700;font-size:11px;
  text-align:left;padding:3px 8px;color:#3730a3}
.del-emp-btn{background:none;border:none;color:#f87171;cursor:pointer;font-size:14px;padding:0 2px}
.del-emp-btn:hover{color:#dc2626}
.emp-name-inp{border:none;background:transparent;font-family:var(--font);font-size:11px;
  font-weight:600;color:var(--text);outline:none;width:100%;min-width:120px}
.emp-name-inp:focus{background:#eff6ff;border-radius:3px;padding:0 3px}
.hyg-cb{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--border);background:#fff;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;
  transition:all .15s;margin:0 auto}
.hyg-cb:hover{border-color:#94a3b8}
.hyg-cb.ok{background:var(--green-light);border-color:#86efac;color:var(--green)}
.hyg-cb.no{background:var(--red-light);border-color:#fca5a5;color:var(--red)}
.add-emp-row{background:#f8fafc}
.add-emp-row td{padding:5px 8px}

/* CONTROL FORM */
.cf-card{background:#fff;border-radius:11px;border:1.5px solid var(--border);overflow:hidden}
.cf-hdr{background:#1a2340;color:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.cf-hdr h4{font-size:12px;font-weight:700}
.cf-scroll{overflow-x:auto}
.cf-tbl{width:100%;border-collapse:collapse;font-size:11px}
.cf-tbl th{background:#f1f5f9;font-weight:700;padding:4px 5px;text-align:center;
  border:1px solid var(--border);font-size:10px;white-space:nowrap}
.cf-tbl td{padding:2px 4px;border:1px solid var(--border);vertical-align:middle}
.cf-tbl .cat-hdr td{background:#1a2340;color:#fff;font-weight:700;font-size:11px;padding:3px 8px}
.cf-inp{border:none;background:transparent;width:100%;text-align:center;font-family:var(--hand);
  font-size:15px;font-weight:600;color:var(--blue);outline:none;min-width:34px}
.cf-inp:focus{background:var(--blue-light);border-radius:3px}
.cf-bal{font-family:var(--hand);font-size:14px;font-weight:700;color:var(--green);text-align:center;background:#f0fdf4}
.cf-bal.neg{color:var(--red);background:#fef2f2}

/* BARTENDER FORM */
.bt-tbl{width:100%;border-collapse:collapse;font-size:11px}
.bt-tbl th{background:#1a2340;color:#fff;font-weight:700;padding:4px 6px;
  border:1px solid #374151;font-size:10px;text-align:center;white-space:nowrap}
.bt-tbl td{padding:3px 5px;border:1px solid var(--border);vertical-align:middle}
.bt-tbl .cat-row td{background:#e0e7ff;font-weight:700;color:#3730a3;padding:3px 8px;font-size:11px}
.bt-inp{border:none;background:transparent;text-align:center;font-family:var(--hand);
  font-size:14px;font-weight:600;color:var(--blue);outline:none;width:50px}
.bt-inp:focus{background:var(--blue-light);border-radius:3px}

/* BARISTA FORM with daily notes */
.notes-inp{border:1px solid var(--border);border-radius:6px;padding:4px 8px;
  font-family:var(--hand);font-size:14px;color:var(--blue);width:100%;outline:none;background:#fff}
.notes-inp:focus{border-color:var(--blue)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:500;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:22px;width:340px;max-width:94vw;
  box-shadow:0 8px 40px rgba(0,0,0,.25)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:12px}
.modal label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:3px}
.modal select,.modal input[type=text]{width:100%;border:1.5px solid var(--border);border-radius:7px;
  padding:7px 10px;font-family:var(--font);font-size:13px;outline:none;margin-bottom:10px;background:#fff}
.modal select:focus,.modal input:focus{border-color:var(--blue)}
.modal-btns{display:flex;gap:7px}
.modal-btns .btn{flex:1;justify-content:center}

/* SEC CONTENT */
.sec-content{display:none}
.sec-content.active{display:block}

/* ══ AUTH SCREEN ══ */
.auth-screen{display:none;position:fixed;inset:0;background:#0f172a;z-index:9999;
  align-items:center;justify-content:center;flex-direction:column}
.auth-screen.visible{display:flex}
.auth-card{background:#1e293b;border-radius:20px;padding:36px 40px;width:340px;
  max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.6);text-align:center}
.auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px}
.auth-logo img{height:36px;object-fit:contain}
.auth-title{font-size:18px;font-weight:800;color:#fff;margin-bottom:6px}
.auth-sub{font-size:12px;color:#64748b;margin-bottom:24px}
.role-btns{display:flex;gap:10px;margin-bottom:20px}
.role-btn{flex:1;padding:14px 10px;border:2px solid #334155;border-radius:12px;
  background:#0f172a;color:#94a3b8;font-family:var(--font);font-size:13px;font-weight:700;
  cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.role-btn:hover{border-color:#60a5fa;color:#fff;background:#1e3a5f}
.role-btn.selected{border-color:#60a5fa;color:#fff;background:#1e3a5f;
  box-shadow:0 0 0 3px rgba(96,165,250,.2)}
.role-btn .role-icon{font-size:26px}
.pin-wrap{display:none;margin-bottom:16px}
.pin-wrap.show{display:block}
.pin-label{font-size:11px;color:#64748b;margin-bottom:6px;text-align:left}
.pin-input{width:100%;border:2px solid #334155;border-radius:10px;padding:10px 14px;
  background:#0f172a;color:#fff;font-size:18px;font-family:var(--hand);font-weight:700;
  letter-spacing:8px;text-align:center;outline:none;transition:border-color .2s}
.pin-input:focus{border-color:#60a5fa}
.pin-error{font-size:11px;color:#f87171;margin-top:5px;min-height:16px;display:block}
.auth-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;
  border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;
  transition:all .15s}
.auth-btn:hover{background:#1448a0}
.auth-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}

/* ══ ROLE BADGE ══ */
.role-badge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer}
.role-badge.admin{background:rgba(250,204,21,.15);color:#fbbf24;border:1px solid rgba(250,204,21,.3)}
.role-badge.staff{background:rgba(148,163,184,.1);color:#94a3b8;border:1px solid rgba(148,163,184,.2)}

/* ══ ADMIN-ONLY ELEMENTS ══ */
.admin-only{display:none!important}
body.is-admin .admin-only{display:flex!important}
body.is-admin .admin-only-block{display:block!important}
.admin-only-block{display:none!important}

/* ══ CONFIRM DIALOG ══ */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:9000;align-items:center;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:#fff;border-radius:16px;padding:28px 26px 22px;width:320px;
  max-width:92vw;box-shadow:0 8px 40px rgba(0,0,0,.25);text-align:center}
.confirm-icon{font-size:40px;margin-bottom:12px}
.confirm-title{font-size:16px;font-weight:700;color:#0f172a;margin-bottom:6px}
.confirm-msg{font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:10px;border:none;border-radius:9px;
  font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.confirm-ok{background:#dc2626;color:#fff}
.confirm-ok:hover{background:#b91c1c}
.confirm-cancel{background:#f1f5f9;color:#64748b}
.confirm-cancel:hover{background:#e2e8f0}

/* ════════ PRINT ════════ */
#printArea{display:none}

@media print{
  @page{size:A4 landscape;margin:4mm 5mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body>*:not(#printArea){display:none!important}
  #printArea{display:block!important;position:fixed;top:0;left:0;width:100%;height:100%}

  /* Logo header */
  .ph{display:flex!important;align-items:center;justify-content:space-between;
    padding:2px 4px 3px;border-bottom:2px solid #1a2340;margin-bottom:3px}
  .ph-left{display:flex;align-items:center;gap:6px}
  .ph-left img{height:28px;object-fit:contain;max-width:110px}
  .ph-right img{height:28px;object-fit:contain;max-width:100px}
  .ph-center{flex:1;text-align:center;font-family:Arial,sans-serif}
  .ph-center h2{font-size:11px;font-weight:800;color:#1a2340;margin:0}
  .ph-center p{font-size:8px;color:#555;margin:0}
  .p-meta{font-family:Arial,sans-serif;font-size:8px;padding:2px 4px;
    background:#f1f5f9!important;border-bottom:1px solid #ccc;margin-bottom:3px;
    display:flex;gap:14px}

  /* Print table base */
  #printArea table{border-collapse:collapse;width:100%;font-family:Arial,sans-serif;font-size:7px;table-layout:fixed}
  #printArea th,#printArea td{border:1px solid #333;padding:1px 2px;text-align:center;
    vertical-align:middle;overflow:hidden;word-break:break-word}

  /* Specific print classes */
  .p-item{text-align:left!important;font-weight:700;font-size:7px;line-height:1.3;width:15%}
  .p-item.yl{background:#f5e642!important}
  .p-cat{background:#1a2340!important;color:#fff!important;font-weight:700;font-size:8px;
    text-align:left!important;padding:2px 5px!important}
  .p-sh{font-size:7px;font-weight:700;color:#333;width:3%}
  .p-hdr{background:#e8edf5!important;font-weight:700;font-size:7px}
  .p-day{font-weight:800;font-size:8px}
  .p-sub{font-weight:400;font-size:6.5px;color:#555}
  .row-pm{background:#f4f8ff!important}
  .p-day-hdr{background:#1a2340!important;color:#fff!important;font-weight:800;font-size:8px}

  /* Handwritten blue values */
  .hv{font-family:'Caveat',cursive!important;font-size:13px!important;font-weight:700!important}
  .hv.y{color:#1a56c4!important}
  .hv.n{color:#dc2626!important}
  .empty{color:#ccc;font-size:7px}

  /* Control form print */
  .p-cf-cat{background:#1a2340!important;color:#fff!important;font-weight:700;font-size:8px;
    text-align:left!important;padding:2px 5px!important}
  .p-bal{font-family:'Caveat',cursive!important;font-size:12px!important;
    font-weight:700!important;color:#16a34a!important}
  .p-bal.neg{color:#dc2626!important}
  /* Bartender column colors in print */
  @media print {

const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SHIFTS = ['AM','PM'];

let curDay = {mod:0,foh:0,boh:0,forms:0};
let weekDates = [];
let ST = {};

function getWeekDates(v){
  const arr=[];
  if(v){
    let b=new Date(v+'T00:00:00');
    // Snap back to Sunday of that week
    const dow=b.getDay(); // 0=Sun
    b.setDate(b.getDate()-dow);
    for(let i=0;i<7;i++){const d=new Date(b);d.setDate(b.getDate()+i);arr.push(d);}
  } else {
    [new Date(2026,2,22),new Date(2026,2,23),new Date(2026,2,24),new Date(2026,2,25),new Date(2026,2,26),new Date(2026,2,27),new Date(2026,2,28)].forEach(d=>arr.push(d));
  }
  return arr;
}
function fmtD(d){return d.getDate()+'-'+MONTHS[d.getMonth()];}
function wk(){return document.getElementById('periodStart').value||'default';}

function ensureST(){
  const w=wk();
  if(!ST[w]) ST[w]={};
  // Standard checklists
  ['mod','foh','boh'].forEach(sec=>{
    CL[sec].forEach(cl=>{
      if(cl.checkType==='hygiene'||cl.checkType==='bartender') return;
      if(!ST[w][cl.id]) ST[w][cl.id]={};
      const allItems=(cl.groups||[]).flatMap(g=>g.items||[]);
      for(let di=0;di<7;di++){
        if(!ST[w][cl.id][di]) ST[w][cl.id][di]={};
        allItems.forEach(item=>{
          if(!ST[w][cl.id][di][item.id]) ST[w][cl.id][di][item.id]={flagged:false};
          SHIFTS.forEach(sh=>{
            if(!ST[w][cl.id][di][item.id][sh])
              ST[w][cl.id][di][item.id][sh]={v:null,temp:'',comment:''};
          });
        });
      }
    });
  });
  // Hygiene — per day, per employee
  ['foh_hygiene','hoh_hygiene'].forEach(hid=>{
    if(!ST[w][hid]) ST[w][hid]={employees:[],checks:{}};
    for(let di=0;di<7;di++){
      if(!ST[w][hid].checks[di]) ST[w][hid].checks[di]={};
    }
  });
  // Bartender
  if(!ST[w]['foh_bartender']) ST[w]['foh_bartender']={};
  ['chiller','bases'].forEach(sec=>{
    BT_ITEMS[sec].forEach(item=>{
      if(!ST[w]['foh_bartender'][item]) ST[w]['foh_bartender'][item]={sl:'',uom:'',oh:'',par:'',prep:{}};
      weekDates.forEach((_,di)=>{
        if(!ST[w]['foh_bartender'][item].prep[di]) ST[w]['foh_bartender'][item].prep[di]={oh:'',par:'',prep:''};
      });
    });
  });
  // Chiller form
  if(!ST[w]['form_chiller']) ST[w]['form_chiller']={};
  CHILLER_CATS.forEach(cat=>cat.items.forEach(item=>{
    const key=item.code||item.name;
    if(!ST[w]['form_chiller'][key]) ST[w]['form_chiller'][key]={op:''};
    for(let di=0;di<7;di++){
      if(!ST[w]['form_chiller'][key][di]) ST[w]['form_chiller'][key][di]={inn:'',out:''};
    }
  }));
  // Cooling
  if(!ST[w]['form_cooling']) ST[w]['form_cooling']={};
  COOLING_PRODUCTS.forEach(p=>{
    if(!ST[w]['form_cooling'][p]) ST[w]['form_cooling'][p]={startTime:''};
    COOLING_TIMES.forEach(t=>{if(!ST[w]['form_cooling'][p][t]) ST[w]['form_cooling'][p][t]={temp:'',by:''};});
    if(!ST[w]['form_cooling'][p].yield) ST[w]['form_cooling'][p].yield={batch:'',liters:''};
  });
  // Freezer form
  if(!ST[w]['form_freezer']) ST[w]['form_freezer']={};
  FREEZER_CATS.forEach(cat=>cat.items.forEach(item=>{
    const key=item.code||item.name;
    if(!ST[w]['form_freezer'][key]) ST[w]['form_freezer'][key]={op:''};
    for(let di=0;di<7;di++){
      if(!ST[w]['form_freezer'][key][di]) ST[w]['form_freezer'][key][di]={inn:'',out:''};
    }
  }));
  // Stockroom form
  if(!ST[w]['form_stockroom']) ST[w]['form_stockroom']={};
  STOCKROOM_CATS.forEach(cat=>cat.items.forEach(item=>{
    const key=item.code||item.name;
    if(!ST[w]['form_stockroom'][key]) ST[w]['form_stockroom'][key]={op:''};
    for(let di=0;di<7;di++){
      if(!ST[w]['form_stockroom'][key][di]) ST[w]['form_stockroom'][key][di]={inn:'',out:''};
    }
  }));
  // Pizza dough — all 7 days
  if(!ST[w]['form_pizzadough']) ST[w]['form_pizzadough']={};
  for(let di=0;di<7;di++){
    if(!ST[w]['form_pizzadough'][di]) ST[w]['form_pizzadough'][di]={day:'',ambtemp:'',ambunit:'C'};
    PIZZA_TIMES.forEach(t=>{if(!ST[w]['form_pizzadough'][di][t]) ST[w]['form_pizzadough'][di][t]={amb:'',dough:'',by:''};});
  }
}

let fbApp, fbDb, fbRef;
let fbBranch = 'MOA'; // default, updated from meta bar

function initFirebase(){
  try{
    if(typeof firebase === 'undefined') throw new Error('Firebase SDK not loaded');
    if(!firebase.apps.length) fbApp = firebase.initializeApp(FIREBASE_CONFIG);
    else fbApp = firebase.apps[0];
    fbDb = firebase.database(fbApp);
    console.log('Firebase connected');
    setupFirebaseSync();
  }catch(e){
    console.warn('Firebase failed, falling back to localStorage:', e);
    loadFromLocalStorage();
  }
}

function getFbPath(){
  const branch = (document.getElementById('branch')?.value || fbBranch || 'MOA').toUpperCase().replace(/[.#$/\[\]]/g,'_');
  return 'checklists/' + branch;
}

function setupFirebaseSync(){
  // Listen for real-time updates from Firebase
  const path = getFbPath();
  fbRef = fbDb.ref(path);
  fbRef.on('value', snap => {
    const data = snap.val();
    if(data){
      if(data.state) ST = data.state;
      if(data.meta){
        const meta = data.meta;
        ['branch','periodLabel','modName','periodStart'].forEach(k=>{
          const el=document.getElementById(k);
          if(el && meta[k]) el.value=meta[k];
        });
        fbBranch = meta.branch || fbBranch;
      }
      // Re-render if already logged in
      if(currentRole) { renderSec(curSec); if(curSec==='forms') renderForms(); }
    }
    // Also load from localStorage as fallback cache
    loadFromLocalStorage();
    // Update status indicator
    const fbSt=document.getElementById('fbStatus');
    if(fbSt){ fbSt.innerHTML='&#9889; Live'; fbSt.style.color='#4ade80'; }
  }, err => {
    console.warn('Firebase read error:', err);
    loadFromLocalStorage();
    const fbSt=document.getElementById('fbStatus');
    if(fbSt){ fbSt.innerHTML='&#9888; Offline'; fbSt.style.color='#f87171'; }
  });
}

// ═══════ SAVE / LOAD ═══════
let svTmr=null;
function save(){
  clearTimeout(svTmr);
  svTmr=setTimeout(()=>{
    const meta = {
      branch:document.getElementById('branch')?.value||'MOA',
      periodLabel:document.getElementById('periodLabel')?.value||'',
      modName:document.getElementById('modName')?.value||'',
      periodStart:document.getElementById('periodStart')?.value||'',
    };
    const payload = { state: ST, meta: meta, updatedAt: Date.now() };

    // Save to Firebase
    try{
      if(fbDb){
        fbDb.ref(getFbPath()).set(payload)
          .then(()=>{
            const el=document.getElementById('saveInd');
            if(el){ el.innerHTML='&#10003; Saved'; el.classList.add('ok');
              setTimeout(()=>{ el.innerHTML='&#9679; Auto-save'; el.classList.remove('ok'); },1500); }
          })
          .catch(e=>{ console.warn('Firebase save error:', e); saveToLocalStorage(payload); });
      } else { saveToLocalStorage(payload); }
    }catch(e){ saveToLocalStorage(payload); }

    // Always also cache locally
    saveToLocalStorage(payload);
  },600);
}

function saveToLocalStorage(payload){
  try{
    localStorage.setItem(SK+'_s', JSON.stringify(payload.state));
    localStorage.setItem(SK+'_m', JSON.stringify(payload.meta));
    const el=document.getElementById('saveInd');
    if(el && !fbDb){ el.innerHTML='&#10003; Saved'; el.classList.add('ok');
      setTimeout(()=>{ el.innerHTML='&#9679; Auto-save'; el.classList.remove('ok'); },1500); }
  }catch(e){}
}

function load(){
  initFirebase(); // Firebase takes over, localStorage is fallback
}

function loadFromLocalStorage(){
  try{
    const s=localStorage.getItem(SK+'_s'); if(s && Object.keys(ST).length===0) ST=JSON.parse(s);
    const m=localStorage.getItem(SK+'_m');
    if(m){const meta=JSON.parse(m);['branch','periodLabel','modName','periodStart'].forEach(k=>{
      const el=document.getElementById(k);
      if(el && meta[k] && !el.value) el.value=meta[k];
    });}
  }catch(e){}
}

// ═══════ SECTION SWITCHING ═══════
function switchSec(sec,btn){
  curSec=sec;
  document.querySelectorAll('.sec-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.sec-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('sec-'+sec).classList.add('active');
  if(sec==='forms') renderForms();
  else renderSec(sec);
}

// ═══════ RENDER SECTION ═══════
function renderSec(sec){
  try{
  const cls=CL[sec];
  if(!cls||!cls.length) return;
  const ci=curCl[sec]||0;
  const cl=cls[ci];
  if(!cl) return;
  const di=curDay[sec]||0;

  // Build cl tabs
  const tw=document.getElementById(sec+'-cltabs');
  tw.innerHTML='';
  cls.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='cl-tab'+(i===ci?' active':'');
    b.textContent=c.name;
    b.onclick=()=>{curCl[sec]=i;renderSec(sec);};
    tw.appendChild(b);
  });
  document.getElementById(sec+'-title').textContent=cl.name;
  document.getElementById(sec+'-sub').textContent=cl.sub||'';

  // Edit checklist button
  let editBtn=document.getElementById(sec+'-editbtn');
  if(!editBtn){
    editBtn=document.createElement('button');
    editBtn.id=sec+'-editbtn';
    editBtn.style.cssText='margin:4px 14px 0;padding:5px 12px;font-size:11px;font-weight:700;background:#1a2340;color:#fff;border:none;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:5px';
    document.getElementById(sec+'-sub').parentNode.insertAdjacentElement('afterend',editBtn);
  }
  editBtn.innerHTML='&#9998; Edit Checklist Items';
  editBtn.onclick=()=>openEditModal(sec,cl);
  editBtn.className='admin-only';

  // Special types
  if(cl.checkType==='hygiene'){
    document.getElementById(sec+'-prog').style.width='0%';
    document.getElementById(sec+'-proglbl').textContent='';
    document.getElementById(sec+'-daytabs').innerHTML='';
    const wrap=document.getElementById(sec+'-cards');
    renderHygieneTable(wrap,cl);
    return;
  }
  if(cl.checkType==='bartender'){
    document.getElementById(sec+'-prog').style.width='0%';
    document.getElementById(sec+'-proglbl').textContent='';
    document.getElementById(sec+'-daytabs').innerHTML='';
    renderBartenderForm(document.getElementById(sec+'-cards'),cl);
    return;
  }

  // Day tabs
  const dw=document.getElementById(sec+'-daytabs');
  dw.innerHTML='';
  weekDates.forEach((d,dIdx)=>{
    const b=document.createElement('button');
    b.className='day-tab'+(dIdx===di?' active':'');
    const st=dayStatus(cl,dIdx);
    if(st==='done') b.classList.add('done');
    else if(st==='partial') b.classList.add('partial');
    b.innerHTML=DAYS[d.getDay()]+' '+fmtD(d)+'<span class="dot"></span>';
    b.onclick=()=>{curDay[sec]=dIdx;renderSec(sec);};
    dw.appendChild(b);
  });
  renderCards(sec,cl,di);
  // Update progress bar
  try{
    let tot=0,done=0;
    (cl.groups||[]).flatMap(g=>g.items||[]).forEach(item=>{
      SHIFTS.forEach(sh=>{tot++;const s=S(cl.id,di,item.id,sh);if(s&&s.v)done++;});
    });
    const pct=tot?Math.round(done/tot*100):0;
    const pb=document.getElementById(sec+'-prog');
    const pl=document.getElementById(sec+'-proglbl');
    if(pb) pb.style.width=pct+'%';
    if(pl) pl.textContent=done+'/'+tot+' items  '+pct+'%';
  }catch(e2){}
  }catch(e){ console.error('renderSec crash:',e); }
}

function dayStatus(cl,di){
  ensureST();let tot=0,fil=0;
  if(!cl.groups) return 'empty';
  cl.groups.flatMap(g=>g.items||[]).forEach(item=>{
    SHIFTS.forEach(sh=>{
      tot++;
      const s=S(cl.id,di,item.id,sh);
      if(s.v!==null) fil++;
    });
  });
  return fil===0?'empty':fil===tot?'done':'partial';
}

function renderCards(sec,cl,di){
  const wrap=document.getElementById(sec+'-cards');
  wrap.innerHTML='';ensureST();

  (cl.groups||[]).forEach(grp=>{
    const d=document.createElement('div');
    d.className='grp-div';d.style.animationDelay=(delay*15)+'ms';

      const allOk=[amS,pmS].every(s=>s.v==='ok'||s.v==='yes');
      const anyNo=[amS,pmS].some(s=>s.v==='no');
      const card=document.createElement('div');

}

function toggleFlag(clId,di,itemId,btn){
  ensureST();SF(clId,di,itemId).flagged=!SF(clId,di,itemId).flagged;

function findSec(clId){
  for(const sec of ['mod','foh','boh']) if(CL[sec].find(c=>c.id===clId)) return sec;

}
function updateProg(sec,cl,di){
  if(!cl.groups){
    document.getElementById(sec+'-prog').style.width='0%';
    document.getElementById(sec+'-proglbl').textContent='';
    return;
  }
  ensureST();let tot=0,fil=0;
  cl.groups.flatMap(g=>g.items||[]).forEach(item=>{
    SHIFTS.forEach(sh=>{tot++;if(S(cl.id,di,item.id,sh).v!==null)fil++;});
  });
  const pct=tot?Math.round(fil/tot*100):0;
  document.getElementById(sec+'-prog').style.width=pct+'%';
  document.getElementById(sec+'-proglbl').textContent=fil+' / '+tot+' fields filled ('+pct+'%)';
}

function addEmployee(hid,di){
  ensureST();

  ST[w][hid].employees.push({name:'',sap:''});

async function delEmployee(hid,di,ei){
  const ok=await showConfirm('Delete Employee','Remove this employee from the checklist? This will clear all their check data.','Delete','&#128465;&#65039;');
  if(!ok) return;
  ensureST();
  const w=wk();
  ST[w][hid].employees.splice(ei,1);
  // Remove checks for this employee
  for(let d=0;d<7;d++){
    if(ST[w][hid].checks[d]){
      // Shift remaining indices down
      const newChecks={};
      Object.keys(ST[w][hid].checks[d]).forEach(k=>{
        const ki=parseInt(k);
        if(ki<ei) newChecks[ki]=ST[w][hid].checks[d][k];
        else if(ki>ei) newChecks[ki-1]=ST[w][hid].checks[d][k];
      });
      ST[w][hid].checks[d]=newChecks;
    }
  }
  save();
  renderSec('foh');
}

function setHyg(hid,di,ei,ci,box){
  ensureST();
  const w=wk();
  if(!ST[w][hid].checks[di]) ST[w][hid].checks[di]={};
  if(!ST[w][hid].checks[di][ei]) ST[w][hid].checks[di][ei]={};
  const cur=ST[w][hid].checks[di][ei][ci];
  let next=null;
  if(cur===null||cur===undefined) next='ok';
  else if(cur==='ok') next='no';
  else next=null;
  ST[w][hid].checks[di][ei][ci]=next;
  box.className='hyg-cb'+(next==='ok'?' ok':next==='no'?' no':'');
  box.innerHTML=next==='ok'?'&#10003;':next==='no'?'&#10007;':'';
  save();
}

    cat.items.forEach((item, ii)=>{
      const key = item.code||item.name;
      const fo  = fGetOp(key);
      const fd  = fGet(key, di);

      const balCls = bal!==''&&bal<0?'cf-bal neg':'cf-bal';
      const tr = document.createElement('tr');
      tr.style.background = ii%2===0?'#fff':'#f8fafc';
      tr.innerHTML=`
        <td style="padding:2px 4px">
          <input class="cf-inp" type="text" value="${item.code||''}" placeholder="Code" style="width:58px;font-size:10px"
            ${isAdmin()?'':'readonly style="pointer-events:none;background:#f8fafc;color:#94a3b8;width:58px;font-size:10px"'}
            oninput="editStockItem('${formId}',${ci},${ii},'code',this.value)">

        <td style="text-align:left;padding:2px 4px">
          <input class="cf-inp" type="text" value="${item.name}" placeholder="Item name" style="width:100%;text-align:left;font-weight:600;font-size:11px"
            ${isAdmin()?'':'readonly'}
            oninput="editStockItem('${formId}',${ci},${ii},'name',this.value)">
        </td>
        <td style="padding:2px 4px">
          <input class="cf-inp" type="text" value="${item.uom||''}" placeholder="UOM" style="width:36px;font-weight:700;font-size:10px"

            oninput="editStockItem('${formId}',${ci},${ii},'uom',this.value)">
        </td>
        <td style="background:#eff6ff;padding:1px 2px">
          <input class="cf-inp ${fo.op?'has-val':''}" type="number" value="${fo.op}" placeholder="0" style="width:62px;background:transparent"
            oninput="setStockOp('${formId}','${key.replace(/'/g,"\\'")}',this)">
        </td>
        <td style="background:#f0fdf4;padding:1px 2px">
          <input class="cf-inp ${fd.inn?'has-val':''}" type="number" value="${fd.inn}" placeholder="0" style="width:54px;background:transparent"
            oninput="setStockDay('${formId}','${key.replace(/'/g,"\\'")}',${di},'inn',this)">
        </td>
        <td style="background:#fef9c3;padding:1px 2px">
          <input class="cf-inp ${fd.out?'has-val':''}" type="number" value="${fd.out}" placeholder="0" style="width:54px;background:transparent"

  footer.innerHTML='Verified by: Name / SAP #: _________________ &nbsp;&nbsp; (MOD) Signature: _________________';

// ── Stock form mutations ────────────────────────────────────────────────────
function addStockCategory(formId){
  if(!isAdmin()) return;
  ensureST();
  if(!ST[wk()][formId+'_cats']) ST[wk()][formId+'_cats']=[];
  ST[wk()][formId+'_cats'].push({cat:'NEW CATEGORY',items:[]});
  save();renderForms();
}
async function deleteStockCat(formId,ci){
  if(!isAdmin()) return;
  const ok=await showConfirm('Delete Category','Delete this entire category and all its items? This cannot be undone.','Delete','&#128465;&#65039;');
  if(!ok) return;
  ensureST();
  ST[wk()][formId+'_cats'].splice(ci,1);
  save();renderForms();
}
function editStockCat(formId,ci,val){
  if(!isAdmin()) return;
  ensureST();
  ST[wk()][formId+'_cats'][ci].cat=val;
  save();
}
function addStockItem(formId,ci){
  if(!isAdmin()) return;
  ensureST();
  const newItem={code:'',name:'NEW ITEM',uom:'PC'};
  ST[wk()][formId+'_cats'][ci].items.push(newItem);
  const key=newItem.code||newItem.name;
  if(!ST[wk()][formId][key]) ST[wk()][formId][key]={op:''};
  for(let di=0;di<7;di++) if(!ST[wk()][formId][key][di]) ST[wk()][formId][key][di]={inn:'',out:''};
  save();renderForms();
}
async function deleteStockItem(formId,ci,ii){
  if(!isAdmin()) return;
  const itemName=(ST[wk()][formId+'_cats']&&ST[wk()][formId+'_cats'][ci]&&ST[wk()][formId+'_cats'][ci].items[ii]&&ST[wk()][formId+'_cats'][ci].items[ii].name)||'this item';
  const ok=await showConfirm('Delete Item','Remove "'+itemName+'" from the list? This cannot be undone.','Delete','&#128465;&#65039;');
  if(!ok) return;
  ensureST();
  ST[wk()][formId+'_cats'][ci].items.splice(ii,1);
  save();renderForms();
}
function editStockItem(formId,ci,ii,field,val){
  ensureST();
  ST[wk()][formId+'_cats'][ci].items[ii][field]=val;
  save();
}
function setStockOp(formId,key,el){
  ensureST();
  if(!ST[wk()][formId][key]) ST[wk()][formId][key]={op:''};
  ST[wk()][formId][key].op=el.value;
  if(el.value) el.classList.add('has-val'); else el.classList.remove('has-val');
  refreshStockBals(formId,key);
  save();
}
function setStockDay(formId,key,di,field,el){
  ensureST();
  if(!ST[wk()][formId][key]) ST[wk()][formId][key]={op:''};
  if(!ST[wk()][formId][key][di]) ST[wk()][formId][key][di]={inn:'',out:''};
  ST[wk()][formId][key][di][field]=el.value;
  if(el.value) el.classList.add('has-val'); else el.classList.remove('has-val');
  refreshStockBals(formId,key);
  save();
}
function refreshStockBals(formId,key){
  ensureST();
  const safeKey=key.replace(/[^a-z0-9]/gi,'_');
  const fo=ST[wk()][formId][key]||{op:''};
  weekDates.forEach((_,di)=>{
    const fd=(ST[wk()][formId][key]&&ST[wk()][formId][key][di])||{inn:'',out:''};
    const bal=calcBal(fo.op,fd.inn,fd.out);
    const el=document.getElementById('sbal_'+formId+'_'+safeKey+'_'+di);
    if(el){ el.textContent=bal!==''?bal:''; el.className=bal!==''&&bal<0?'cf-bal neg':'cf-bal'; }
  });
}

function calcBal(op,inn,out){
  const o=parseFloat(op)||0,i=parseFloat(inn)||0,u=parseFloat(out)||0;
  if(!op&&!inn&&!out) return '';
  return o+i-u;
}
function setOp(key,el){
  ensureST();FO(key).op=el.value;
  if(el.value)el.classList.add('has-val');else el.classList.remove('has-val');
  refreshBals(key);save();
}
function setCF(key,di,field,el){
  ensureST();FC(key,di)[field]=el.value;
  if(el.value)el.classList.add('has-val');else el.classList.remove('has-val');
  refreshBals(key);save();
}
function refreshBals(key){
  ensureST();const fo=FO(key);
  weekDates.forEach((_,di)=>{
    const fd=FC(key,di);
    const bal=calcBal(fo.op,fd.inn,fd.out);
    const el=document.getElementById('bal_'+key.replace(/[^a-z0-9]/gi,'_')+'_'+di);
    if(el){el.textContent=bal!==''?bal:'';el.className='cf-bal'+(bal!==''&&bal<0?' neg':'');}
  });
}

function openPrintModal(){
  document.getElementById('p-sec').value=curSec;
  populatePCls();populatePWeeks();

  document.getElementById('p-mod').value=document.getElementById('modName').value;
  document.getElementById('printModal').classList.add('open');
}
function closePrint(){document.getElementById('printModal').classList.remove('open');}
function populatePCls(){
  const sec=document.getElementById('p-sec').value;
  const sel=document.getElementById('p-cl');
  sel.innerHTML='';
  if(sec==='forms'){
    FORM_LIST.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.name;sel.appendChild(o);});
  }else{
    CL[sec].forEach(cl=>{const o=document.createElement('option');o.value=cl.id;o.textContent=cl.name;sel.appendChild(o);});
  }
}
function populatePWeeks(){
  const sel=document.getElementById('p-week');
  sel.innerHTML='';
  const weeks=Object.keys(ST);
  if(!weeks.length){sel.innerHTML='<option value="default">Default Week</option>';return;}
  weeks.forEach(w=>{
    const o=document.createElement('option');
    const dates=getWeekDates(w==='default'?'':w);
    o.value=w;o.textContent=w==='default'?'Default Week':fmtD(dates[0])+' \u2013 '+fmtD(dates[6]);
    if(w===wk()) o.selected=true;
    sel.appendChild(o);
  });
}
document.getElementById('p-sec').addEventListener('change',populatePCls);

function doPrint(){
  const sec=document.getElementById('p-sec').value;
  const clId=document.getElementById('p-cl').value;
  const w=document.getElementById('p-week').value;
  const branch=document.getElementById('p-branch').value||'MOA';
  const mod=document.getElementById('p-mod').value||'';
  const period=document.getElementById('periodLabel').value||'';
  const dates=getWeekDates(w==='default'?'':w);
  closePrint();
  buildPrint(sec,clId,w,branch,mod,period,dates);

}

function printHeader(title,sub,branch,period,mod){
  return `<div class="ph">
    <div class="ph-left">
      <img src="${PIATTO_SRC}" alt="Piatto">
      <img src="${STEAK_SRC}" alt="Steak House" style="border-radius:2px;margin-left:4px">
    </div>
    <div class="ph-center"><h2>${title}</h2><p>${sub||''}</p></div>
    <div class="ph-right"><img src="${ALFA_SRC}" alt="ALFA.CO"></div>
  </div>
  <div class="p-meta">
    <span><b>BRANCH:</b> ${branch}</span>
    <span><b>PERIOD:</b> ${period}</span>
    <span><b>MOD:</b> ${mod}</span>
  </div>`;
}

function hv(v){
  if(v==='ok'||v==='yes') return '<span class="hv y">&#10003;</span>';
  if(v==='no') return '<span class="hv n">&#10007;</span>';
  return '<span class="empty">&#183;</span>';
}
function hvT(v){return v?`<span class="hv y">${v}</span>`:'<span class="empty">&#183;</span>';}

function buildPrint(sec,clId,w,branch,mod,period,dates){
  const pa=document.getElementById('printArea');
  pa.innerHTML='';
  const wkData=ST[w]||{};

  if(sec==='forms'){
    buildFormPrint(pa,clId,w,branch,mod,period,dates,wkData);
    return;
  }

  // Hygiene special print
  if(clId==='foh_hygiene'||clId==='hoh_hygiene'){
    buildHygienePrint(pa,clId,w,branch,mod,period,dates,wkData);
    return;
  }

  // Find checklist
  const allCls=[...CL.mod,...CL.foh,...CL.boh];
  const cl=allCls.find(c=>c.id===clId);
  if(!cl){pa.innerHTML='<p style="font-family:Arial;padding:20px">Checklist not found.</p>';return;}

  const ct=cl.checkType;
  const allItems=(cl.groups||[]).flatMap(g=>g.items||[]);
  const isWeekly=cl.isWeekly;

  if(ct==='bartender'){
    buildBartenderPrint(pa,w,branch,mod,period,dates,wkData);
    return;
  }

  // Standard table: rows = items x AM/PM, cols = days
  let dayHdr='',tqHdr='',doneByRow='';
  dates.forEach((d,di)=>{
    if(ct==='temp'){
      dayHdr+=`<th colspan="3" class="p-hdr p-day">${DAYS[d.getDay()]}<br><span class="p-sub">${fmtD(d)}</span></th>`;
      tqHdr+=`<th class="p-hdr" style="font-size:6.5px">&#176;C/Ans</th><th class="p-hdr" style="font-size:6.5px">Taste</th><th class="p-hdr" style="font-size:6.5px">Appear.</th>`;
    } else {
      dayHdr+=`<th colspan="2" class="p-hdr p-day">${DAYS[d.getDay()]}<br><span class="p-sub">${fmtD(d)}</span></th>`;
      tqHdr+=`<th class="p-hdr" style="font-size:6.5px">AM</th><th class="p-hdr" style="font-size:6.5px">PM</th>`;
    }
    doneByRow+=ct==='temp'?`<td colspan="3"><span class="hv y">${mod||''}</span></td>`:`<td colspan="2"><span class="hv y">${mod||''}</span></td>`;
  });

  let tbody='';
  (cl.groups||[]).forEach(grp=>{
    const colspan=2+(ct==='temp'?dates.length*3:dates.length*2);
    tbody+=`<tr><td colspan="${colspan}" class="p-cat">${grp.name}</td></tr>`;
    (grp.items||[]).forEach(item=>{
      if(ct==='temp'){
        SHIFTS.forEach((sh,si)=>{
          tbody+=`<tr class="${si===0?'':'row-pm'}">`;
          if(si===0) tbody+=`<td class="p-item${item.yellow?' yl':''}" rowspan="2">${item.label}</td>`;
          tbody+=`<td class="p-sh">${sh}</td>`;
          dates.forEach((_,di)=>{
            const s=(wkData[cl.id]&&wkData[cl.id][di]&&wkData[cl.id][di][item.id]&&wkData[cl.id][di][item.id][sh])||{v:null,temp:'',taste:null,app:null};
            tbody+=`<td>${item.hasTemp?hvT(s.temp):hv(s.v)}</td><td>${hv(s.taste)}</td><td>${hv(s.app)}</td>`;
          });
          tbody+='</tr>';
        });
      } else {
        // cb / yn: one row per item, 2 cols per day (AM/PM)
        tbody+=`<tr>
          <td class="p-item${item.yellow?'':''}" colspan="2">${item.label}</td>`;
        dates.forEach((_,di)=>{
          const amS=(wkData[cl.id]&&wkData[cl.id][di]&&wkData[cl.id][di][item.id]&&wkData[cl.id][di][item.id]['AM'])||{v:null};
          const pmS=(wkData[cl.id]&&wkData[cl.id][di]&&wkData[cl.id][di][item.id]&&wkData[cl.id][di][item.id]['PM'])||{v:null};
          tbody+=`<td>${hv(amS.v)}</td><td>${hv(pmS.v)}</td>`;
        });
        tbody+='</tr>';
      }
    });
  });

  pa.innerHTML=printHeader(cl.name,cl.sub,branch,period,mod)+`
  <table>
    <thead>
      <tr>
        <th class="p-item" ${ct==='temp'?'rowspan="2"':'colspan="2"'}>Item / Check</th>
        ${ct==='temp'?'<th rowspan="2" class="p-sh p-hdr">Sh.</th>':''}
        ${dayHdr}
      </tr>
      ${ct==='temp'?`<tr>${tqHdr}</tr>`:''}
      ${cl.hasDoneby?`<tr><td colspan="2">Done by</td>${doneByRow}</tr>`:''}
    </thead>
    <tbody>${tbody}</tbody>
  </table>`;
}

function buildHygienePrint(pa,clId,w,branch,mod,period,dates,wkData){
  const hyg=wkData[clId]||{employees:[],checks:{}};
  const sectionName=clId==='foh_hygiene'?'Front of House (FOH)':'Heart of House (HOH)';
  const shortCols=['Hair','Moustache','Nails','Physical Cond.','No Jewelry','Uniform','Name Tag','Baladiya','Blk Shoes','Belt','Ballpen','Core Val.','Mask','Temp<38','Health','Remarks'];

  let dayTables='';
  dates.forEach((d,di)=>{
    const checks=hyg.checks[di]||{};

    (hyg.employees||[]).forEach((emp,ei)=>{
      const ec=checks[ei]||{};
      rows+=`<tr><td style="font-size:8px;text-align:center">${ei+1}</td>
        <td style="text-align:left;font-weight:600;font-size:8px">${emp.name||''}</td>
        <td style="font-size:8px">${emp.sap||''}</td>
        ${shortCols.map((_,ci)=>`<td>${ec[ci]==='ok'?'<span class="hv y">&#10003;</span>':ec[ci]==='no'?'<span class="hv n">&#10007;</span>':'<span class="empty">&#183;</span>'}</td>`).join('')}
      </tr>`;
    });
    dayTables+=`
      <table style="margin-bottom:6px;width:100%">
        <thead>
          <tr><td colspan="${3+shortCols.length}" class="p-hyg-hdr">${DAYS[d.getDay()]} ${fmtD(d)} &mdash; ${sectionName}</td></tr>
          <tr><th style="font-size:7px">#</th><th style="text-align:left;font-size:7px">Employee Name</th><th style="font-size:7px">SAP</th>

  pa.innerHTML=printHeader('Daily Hygiene Checklist — '+sectionName,'Checked / Noted',branch,period,mod)+dayTables;
}

    const getDay=(key,di)=>(formData[key]&&formData[key][di])||{inn:'',out:''};

          ${dayHdr}

  if(clId==='form_cooling'){
    let tHdr='',tSubHdr='';

      tHdr+=`<th colspan="2" class="p-day-hdr" style="font-size:7px">${t}</th>`;

    });
    let tbody='';

      const pd=(wkData['form_cooling']&&wkData['form_cooling'][prod])||{startTime:'',yield:{batch:'',liters:''}};
      tbody+=`<tr><td style="text-align:left;font-weight:700;font-size:8px">${prod}</td>
        <td><span class="hv y">${pd.startTime||''}</span></td>`;
      COOLING_TIMES.forEach(t=>{
        const td=(pd[t])||{temp:'',by:''};
        tbody+=`<td><span class="hv y">${td.temp||''}</span></td><td><span class="hv y">${td.by||''}</span></td>`;
      });
      tbody+=`<td><span class="hv y">${(pd.yield&&pd.yield.batch)||''}</span></td>

      PIZZA_TIMES.forEach(t=>{
        const td=(dd[t])||{amb:'',dough:'',by:''};
        tbody+=`<tr><td style="font-weight:700;text-align:center;font-size:8px">${t}</td>
          <td><span class="hv y">${td.amb||''}</span></td>
          <td><span class="hv y">${td.dough||''}</span></td>
          <td><span class="hv y">${td.by||''}</span></td></tr>`;

    pa.innerHTML=printHeader('Pizza Dough Temperature Tracker','Daily pizza dough temperature log — all 7 days',branch,period,mod)+`

      <thead><tr>
        <th class="p-hdr">Time</th>

      <tbody>${tbody}</tbody>

    return;

}

let _editSec='', _editCl=null;

function openEditModal(sec,cl){
  if(!isAdmin()) return;
  _editSec=sec; _editCl=cl;
  document.getElementById('editModal').classList.add('open');
  renderEditModal();
}
function closeEditModal(){
  document.getElementById('editModal').classList.remove('open');
}
function renderEditModal(){
  const body=document.getElementById('editModalBody');
  body.innerHTML='';
  const cl=_editCl;

  (cl.groups||[]).forEach((grp,gi)=>{
    // Group header
    const grpDiv=document.createElement('div');
    grpDiv.style.cssText='background:#1e3a5f;color:#fff;border-radius:7px;padding:6px 10px;margin-bottom:4px;margin-top:8px;display:flex;align-items:center;justify-content:space-between';
    grpDiv.innerHTML=`
      <input value="${grp.name}" style="background:transparent;border:none;color:#fff;font-weight:700;font-size:12px;outline:none;flex:1"
        oninput="editGrpName(_editCl,${gi},this.value)">
      <div style="display:flex;gap:5px">
        <button onclick="addEditItem(_editCl,${gi})" style="background:#16a34a;color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer">+ Item</button>
        <button onclick="deleteEditGrp(_editCl,${gi})" style="background:#dc2626;color:#fff;border:none;border-radius:4px;padding:2px 6px;font-size:10px;cursor:pointer">&#128465;</button>
      </div>`;
    body.appendChild(grpDiv);

    (grp.items||[]).forEach((item,ii)=>{
      const row=document.createElement('div');
      row.style.cssText='display:flex;gap:6px;align-items:center;padding:3px 4px;background:'+(ii%2===0?'#f8fafc':'#fff')+';border-radius:5px;margin-bottom:2px';
      row.innerHTML=`
        <span style="font-size:10px;color:#94a3b8;width:20px;text-align:right">${ii+1}</span>
        <input value="${item.label||item.name||''}" placeholder="Item label"
          style="flex:1;border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px;font-size:12px;font-family:var(--font);outline:none"
          oninput="editItemLabel(_editCl,${gi},${ii},this.value)">
        <label style="display:flex;align-items:center;gap:3px;font-size:10px;color:#92400e;cursor:pointer">
          <input type="checkbox" ${item.yellow?'checked':''} onchange="editItemYellow(_editCl,${gi},${ii},this.checked)"> KEY
        </label>
        <label style="display:flex;align-items:center;gap:3px;font-size:10px;color:#1e40af;cursor:pointer">
          <input type="checkbox" ${item.hasTemp?'checked':''} onchange="editItemTemp(_editCl,${gi},${ii},this.checked)"> Temp
        </label>
        <button onclick="deleteEditItem(_editCl,${gi},${ii})" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:14px">&#128465;</button>`;
      body.appendChild(row);
    });
  });

  // Add group button
  const addGrpBtn=document.createElement('button');
  addGrpBtn.style.cssText='width:100%;margin-top:10px;padding:7px;background:#1a2340;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer';
  addGrpBtn.textContent='+ Add Group';
  addGrpBtn.onclick=()=>addEditGrp(_editCl);
  body.appendChild(addGrpBtn);
}

function editGrpName(cl,gi,val){ cl.groups[gi].name=val; save(); }
function addEditGrp(cl){
  if(!cl.groups) cl.groups=[];
  cl.groups.push({name:'NEW GROUP',items:[]});
  save(); renderEditModal();
}
async function deleteEditGrp(cl,gi){
  const ok=await showConfirm('Delete Group','Delete this entire group and all its checklist items?','Delete','&#128465;&#65039;');
  if(!ok) return;
  cl.groups.splice(gi,1); save(); renderEditModal();
}
function addEditItem(cl,gi){
  const newItem={id:'item_'+Date.now(),label:'New item',yellow:false,hasTemp:false};
  cl.groups[gi].items.push(newItem);
  save(); renderEditModal();
}
async function deleteEditItem(cl,gi,ii){
  const ok=await showConfirm('Delete Item','Remove "'+((cl.groups[gi].items[ii]||{}).label||'this item')+'" from the checklist?','Delete','&#128465;&#65039;');
  if(!ok) return;
  cl.groups[gi].items.splice(ii,1); save(); renderEditModal();
}
function editItemLabel(cl,gi,ii,val){
  const item=cl.groups[gi].items[ii];
  item.label=val; if(item.name!==undefined) item.name=val;
  save();
}
function editItemYellow(cl,gi,ii,val){ cl.groups[gi].items[ii].yellow=val; save(); }
function editItemTemp(cl,gi,ii,val){ cl.groups[gi].items[ii].hasTemp=val; save(); }

const ADMIN_PIN = '1422';
let currentRole = null; // 'admin' | 'staff'
let _selectedRole = null;

function selectRole(role){
  _selectedRole = role;
  document.getElementById('roleStaff').classList.toggle('selected', role==='staff');
  document.getElementById('roleAdmin').classList.toggle('selected', role==='admin');
  const pinWrap = document.getElementById('pinWrap');
  const loginBtn = document.getElementById('loginBtn');
  if(role==='admin'){
    pinWrap.classList.add('show');
    loginBtn.disabled = true;
    document.getElementById('pinInput').focus();
  } else {
    pinWrap.classList.remove('show');
    document.getElementById('pinError').textContent='';
    loginBtn.disabled = false;
  }
}

function onPinInput(){
  const v = document.getElementById('pinInput').value;
  document.getElementById('loginBtn').disabled = v.length < 1;
  document.getElementById('pinError').textContent = '';
}

// doLogin defined below near init

function switchRole(){
  // Show auth screen again to re-login
  currentRole=null;
  _selectedRole=null;
  document.body.classList.remove('is-admin');
  document.getElementById('roleStaff').classList.remove('selected');
  document.getElementById('roleAdmin').classList.remove('selected');
  document.getElementById('pinWrap').classList.remove('show');
  document.getElementById('pinInput').value='';
  document.getElementById('pinError').textContent='';
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('authScreen').classList.add('visible');
}

function isAdmin(){ return currentRole==='admin'; }

let _confirmResolve = null;

function showConfirm(title, msg, okLabel='Delete', icon='&#9888;&#65039;'){
  return new Promise(resolve=>{
    _confirmResolve = resolve;
    document.getElementById('confirmIcon').innerHTML = icon;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmOkBtn').textContent = okLabel;
    document.getElementById('confirmOkBtn').className = okLabel==='Delete'?'confirm-ok':'confirm-ok';
    document.getElementById('confirmOverlay').classList.add('open');
  });
}
function confirmOk(){
  document.getElementById('confirmOverlay').classList.remove('open');
  if(_confirmResolve){ _confirmResolve(true); _confirmResolve=null; }
}
function confirmCancel(){
  document.getElementById('confirmOverlay').classList.remove('open');
  if(_confirmResolve){ _confirmResolve(false); _confirmResolve=null; }
}


// ═══════ INIT ═══════
function init(){
  load();
  // Set today as default period start if empty
  const ps=document.getElementById('periodStart');
  if(ps&&!ps.value){
    const now=new Date();
    ps.value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  }
  weekDates=getWeekDates(document.getElementById('periodStart').value);
  curDay={mod:0,foh:0,boh:0,forms:0};
  ensureST();
  // Don't render until user logs in
}

// Single unified doLogin — handles auth + render
function doLogin(){
  if(!_selectedRole) return;
  if(_selectedRole==='admin'){
    const pin=document.getElementById('pinInput').value;
    if(pin!==ADMIN_PIN){
      document.getElementById('pinError').textContent='Incorrect PIN. Please try again.';
      document.getElementById('pinInput').value='';
      document.getElementById('loginBtn').disabled=true;
      return;
    }
  }
  currentRole=_selectedRole;
  document.getElementById('authScreen').classList.remove('visible');
  if(currentRole==='admin') document.body.classList.add('is-admin');
  else document.body.classList.remove('is-admin');
  const badge=document.getElementById('roleBadge');
  if(badge){
    badge.className='role-badge btn '+(currentRole==='admin'?'admin':'staff');
    badge.innerHTML=currentRole==='admin'
      ?'&#128272; Admin &nbsp;<small style="font-size:9px;opacity:.7">&#8635;</small>'
      :'&#128104;&#8205;&#127859; Staff &nbsp;<small style="font-size:9px;opacity:.7">&#8635;</small>';
  }
  try{ 
    renderSec(curSec); 
  }catch(e){ 
    console.error('renderSec error:',e);
    // Show fallback content so screen isn't black
    const cards = document.getElementById(curSec+'-cards');
    if(cards) cards.innerHTML = '<div style="padding:20px;color:#e74c3c;font-size:13px">Error loading checklist: '+e.message+'<br><small>Please refresh the page.</small></div>';
  }
}

document.addEventListener('DOMContentLoaded',function(){
  try{ init(); }catch(e){ 
    console.error('init error:',e);
    // Still show the auth screen at minimum
    const auth = document.getElementById('authScreen');
    if(auth) auth.classList.add('visible');
  }
});
</script>
